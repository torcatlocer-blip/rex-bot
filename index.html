<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="theme-color" content="#050505"/>
<title>REX BOT</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:#050505;color:#fff;font-family:monospace;min-height:100vh;}
body{max-width:480px;margin:0 auto;padding-bottom:80px;}
button{font-family:monospace;cursor:pointer;border:none;background:none;color:#fff;}
input{font-family:monospace;outline:none;color:#fff;}
</style>
</head>
<body>

<!-- STATIC FALLBACK — always visible -->

<div id="root" style="padding:20px">
  <div style="text-align:center;padding:40px 0">
    <div style="font-size:32px;color:#22c55e;margin-bottom:8px">◈</div>
    <div style="font-size:18px;font-weight:bold;color:#fff">REX BOT</div>
    <div style="font-size:11px;color:#555;margin-top:6px">Loading…</div>
  </div>
</div>

<script>
// Wrap everything in try/catch so errors are visible
try {

// ══════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════
var TRADE_SIZE = 5;
var SL_PCT = 0.40;
var SCAN_MS = 20000;
var TICK_MS = 12000;
var BAL_MS  = 30000;
var SOL_MINT = "So11111111111111111111111111111111111111112";

// Exit rules: 2x sell 80%, 5x sell 50%, 10x sell 50%, then moonbag
var EXIT_RULES = [
  {phase:1, target:2.0,  sell:0.80, label:"2x"},
  {phase:2, target:5.0,  sell:0.50, label:"5x"},
  {phase:3, target:10.0, sell:0.50, label:"10x"},
];

// ══════════════════════════════════════
//  STATE
// ══════════════════════════════════════
var S = {
  screen: "setup",
  tab: "positions",
  heliusKey: "",
  walletPubkey: "",
  paperMode: true,
  botRunning: false,
  botMode: "NORMAL",
  balance: 10,
  portfolioVal: 10,
  totalPnl: 0,
  solPrice: 150,
  activeTrades: [],
  closedTrades: [],
  scanLog: [],
  wins: 0,
  losses: 0,
  blacklist: [],
  scanning: false,
  scanTimer: null,
  priceTimer: null,
  balTimer: null,
};

// ══════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════
function fU(n){ return "$" + Math.abs(n).toFixed(2); }
function fP(n){ return (n>=0?"+":"") + n.toFixed(1) + "%"; }
function pC(n){ return n>0?"#22c55e":n<0?"#f87171":"#888"; }
function sh(a){ return a ? a.slice(0,5)+"…"+a.slice(-4) : ""; }
function ag(ts){
  var s = Math.floor((Date.now()-ts)/1000);
  return s < 60 ? s+"s" : Math.floor(s/60)+"m";
}
var modeColor = {NORMAL:"#22c55e", STRICT:"#f87171", RECOVERY:"#f59e0b"};

function getEl(id){ return document.getElementById(id); }

function showToast(msg, col){
  col = col || "#22c55e";
  var t = getEl("toast");
  if(!t){
    t = document.createElement("div");
    t.id = "toast";
    t.style.cssText = "position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#111;border-radius:10px;padding:10px 16px;font-size:11px;font-weight:bold;z-index:9999;pointer-events:none;max-width:90vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:opacity 0.3s;opacity:0;";
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.color = col;
  t.style.border = "1px solid "+col+"55";
  t.style.opacity = "1";
  setTimeout(function(){ t.style.opacity = "0"; }, 3500);
}

function persist(){
  try{
    localStorage.setItem("rx_hk", S.heliusKey);
    localStorage.setItem("rx_pk", S.walletPubkey);
    localStorage.setItem("rx_pm", S.paperMode ? "1" : "0");
  }catch(e){}
}

function hydrate(){
  try{
    S.heliusKey    = localStorage.getItem("rx_hk") || "";
    S.walletPubkey = localStorage.getItem("rx_pk") || "";
    S.paperMode    = localStorage.getItem("rx_pm") !== "0";
  }catch(e){}
}

// ══════════════════════════════════════
//  API CALLS
// ══════════════════════════════════════
function fetchJSON(url, opts){
  return fetch(url, opts).then(function(r){ return r.json(); });
}

function getSolPrice(){
  return fetchJSON("https://price.jup.ag/v4/price?ids=SOL")
    .then(function(d){ S.solPrice = d.data&&d.data.SOL ? d.data.SOL.price : 150; return S.solPrice; })
    .catch(function(){ return S.solPrice; });
}

function fetchWalletBalance(){
  if(!S.heliusKey || !S.walletPubkey) return Promise.resolve();
  var rpc = "https://mainnet.helius-rpc.com/?api-key="+S.heliusKey;
  return fetchJSON(rpc, {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({jsonrpc:"2.0",id:1,method:"getBalance",params:[S.walletPubkey]})
  }).then(function(d){
    if(d.result && d.result.value !== undefined){
      var sol = d.result.value / 1e9;
      return getSolPrice().then(function(sp){
        S.balance = parseFloat((sol * sp).toFixed(2));
        S.portfolioVal = S.balance;
        render();
      });
    }
  }).catch(function(e){ console.log("Balance err:", e); });
}

function getDexData(mint){
  return fetchJSON("https://api.dexscreener.com/latest/dex/tokens/"+mint)
    .then(function(d){
      if(!d.pairs || !d.pairs.length) return null;
      var pairs = d.pairs.filter(function(p){ return p.chainId==="solana"; });
      pairs.sort(function(a,b){ return (b.liquidity&&b.liquidity.usd||0)-(a.liquidity&&a.liquidity.usd||0); });
      if(!pairs.length) return null;
      var p = pairs[0];
      return {
        liq:   p.liquidity&&p.liquidity.usd || 0,
        vol24: p.volume&&p.volume.h24 || 0,
        vol1:  p.volume&&p.volume.h1 || 0,
        price: parseFloat(p.priceUsd) || 0,
        buys:  p.txns&&p.txns.h24&&p.txns.h24.buys || 0,
        sells: p.txns&&p.txns.h24&&p.txns.h24.sells || 0,
        ch1:   p.priceChange&&p.priceChange.h1 || 0,
        age:   p.pairCreatedAt ? (Date.now()-p.pairCreatedAt)/60000 : null,
        name:  p.baseToken&&p.baseToken.name || "Unknown",
        sym:   p.baseToken&&p.baseToken.symbol || "???",
      };
    }).catch(function(){ return null; });
}

function getHeliusData(mint){
  if(!S.heliusKey) return Promise.resolve(null);
  var rpc = "https://mainnet.helius-rpc.com/?api-key="+S.heliusKey;
  return Promise.all([
    fetchJSON(rpc,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({jsonrpc:"2.0",id:1,method:"getAccountInfo",params:[mint,{encoding:"jsonParsed"}]})}),
    fetchJSON(rpc,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({jsonrpc:"2.0",id:2,method:"getTokenLargestAccounts",params:[mint]})}),
  ]).then(function(res){
    var mD=res[0], hD=res[1];
    var info = mD.result&&mD.result.value&&mD.result.value.data&&mD.result.value.data.parsed&&mD.result.value.data.parsed.info;
    var top10 = 0;
    if(hD.result && hD.result.value){
      var accs = hD.result.value;
      var tot = accs.reduce(function(s,a){ return s+parseFloat(a.uiAmount||0); },0);
      var t10 = accs.slice(0,10).reduce(function(s,a){ return s+parseFloat(a.uiAmount||0); },0);
      top10 = tot>0 ? (t10/tot)*100 : 0;
    }
    return {
      mintAuth:   !!(info&&info.mintAuthority),
      freezeAuth: !!(info&&info.freezeAuthority),
      top10: top10,
    };
  }).catch(function(){ return null; });
}

function getJupQuote(inM, outM, amount){
  var url = "https://quote-api.jup.ag/v6/quote?inputMint="+inM+"&outputMint="+outM+"&amount="+amount+"&slippageBps=100";
  return fetchJSON(url).catch(function(){ return null; });
}

function getTrending(){
  return fetchJSON("https://api.dexscreener.com/latest/dex/search?q=sol")
    .then(function(d){
      if(!d.pairs) return [];
      var now = Date.now();
      return d.pairs
        .filter(function(p){
          return p.chainId==="solana" &&
            (p.liquidity&&p.liquidity.usd||0) > 5000 &&
            p.pairCreatedAt && (now - p.pairCreatedAt) < 6*3600000;
        })
        .sort(function(a,b){ return (b.volume&&b.volume.h1||0)-(a.volume&&a.volume.h1||0); })
        .slice(0,10)
        .map(function(p){ return p.baseToken&&p.baseToken.address; })
        .filter(Boolean);
    }).catch(function(){ return []; });
}

// ══════════════════════════════════════
//  STRATEGY
// ══════════════════════════════════════
function runStrategy(token){
  var mode = S.botMode;
  var checks = [];
  var pass = true;
  var reason = null;

  function fail(l,r){
    checks.push({l:l,s:"REJECT",r:r});
    if(pass){ pass=false; reason=l+": "+r; }
  }
  function ok(l,r){ checks.push({l:l,s:"PASS",r:r}); }
  function skip(l,r){ checks.push({l:l,s:"SKIP",r:r}); }

  // Layer 1
  var lf = mode==="STRICT" ? 10000 : 5000;
  if(token.liq < lf) fail("Liquidity","$"+token.liq.toFixed(0)+" < $"+lf);
  else ok("Liquidity","$"+token.liq.toFixed(0));

  if(token.mintAuth) fail("Mint Auth","Active");
  else if(token.freezeAuth) fail("Freeze","Active");
  else ok("Perms","Clean");

  if(S.blacklist.indexOf(token.mint)>=0) fail("Blacklist","Flagged");
  else ok("Blacklist","Clear");

  if(!pass) return {pass:pass,reason:reason,checks:checks,sig:null};

  // Layer 2
  var cl = mode==="STRICT" ? 15 : 40;
  if(token.top10 > cl) fail("Concentration",token.top10.toFixed(0)+"%>"+cl+"%");
  else ok("Concentration",token.top10.toFixed(0)+"%");

  var txns = (token.buys||0)+(token.sells||0);
  var bs = txns>0 && (token.buys/txns)>0.88 ? 70 : 35;
  if(bs>55) fail("Bot Score",""+bs);
  else ok("Bot Score",bs+" clean");

  var vlr = token.liq>0 ? token.vol24/token.liq : 0;
  if(vlr>20) fail("Vol/Liq",vlr.toFixed(1)+"x");
  else ok("Vol/Liq",vlr.toFixed(1)+"x");

  if(token.age && token.age>=120){
    ok("Fee Ratio","0.25%");
  } else {
    skip("Fee Ratio",(token.age||0).toFixed(0)+"min");
  }

  if(!pass) return {pass:pass,reason:reason,checks:checks,sig:null};

  // Layer 3
  var mom = Math.min((token.ch1+50),100);
  var vs  = Math.min(token.vol24/10000*40,100);
  var ns  = mom*0.5 + vs*0.5;
  var sig = ns>=65 ? "STRONG" : ns>=40 ? "WEAK" : "NO_SIGNAL";
  ok("Narrative",ns.toFixed(0)+"→"+sig);

  if(sig==="NO_SIGNAL") return {pass:false,reason:"Narrative "+ns.toFixed(0)+"<40",checks:checks,sig:sig};
  return {pass:true,reason:null,checks:checks,sig:sig};
}

// ══════════════════════════════════════
//  BOT SCAN LOOP
// ══════════════════════════════════════
function scanCycle(){
  if(!S.botRunning) return;
  var p1count = S.activeTrades.filter(function(t){ return t.phase===1; }).length;
  if(p1count>0 || S.activeTrades.length>=2) return;
  if(S.balance < TRADE_SIZE){ showToast("⚠ Need $5 to trade","#f59e0b"); return; }

  S.scanning = true;
  render();

  getTrending().then(function(mints){
    var found = false;
    var chain = Promise.resolve();

    mints.forEach(function(mint){
      chain = chain.then(function(){
        if(found || !S.botRunning) return;
        if(S.activeTrades.find(function(t){ return t.mint===mint; })) return;
        if(S.blacklist.indexOf(mint)>=0) return;

        return Promise.all([getDexData(mint), getHeliusData(mint)])
          .then(function(res){
            var dx=res[0], hx=res[1];
            if(!dx) return;

            var token = {
              mint:mint, name:dx.name, sym:dx.sym, price:dx.price,
              liq:dx.liq, vol24:dx.vol24, vol1:dx.vol1||0, age:dx.age,
              top10:hx&&hx.top10||0, mintAuth:hx&&hx.mintAuth||false,
              freezeAuth:hx&&hx.freezeAuth||false,
              buys:dx.buys, sells:dx.sells, ch1:dx.ch1,
            };

            var res2 = runStrategy(token);

            // ADD TO LOG — every CA
            var logEntry = {
              id: Date.now()+Math.random(),
              time: Date.now(),
              mint:mint, sym:token.sym, name:token.name,
              result: res2.pass ? "BUY" : "SKIP",
              reason: res2.pass ? res2.sig+" signal" : (res2.reason||"").slice(0,40),
              checks: res2.checks,
              liq: dx.liq, vol24: dx.vol24, price: dx.price,
              expanded: false,
            };
            S.scanLog.unshift(logEntry);
            if(S.scanLog.length>100) S.scanLog.pop();
            render();

            if(!res2.pass) return;

            return getSolPrice().then(function(sp){
              var lamps = Math.floor((TRADE_SIZE/sp)*1e9);
              return getJupQuote(SOL_MINT, mint, lamps);
            }).then(function(q){
              if(!q || q.error){
                var le = S.scanLog.find(function(l){ return l.mint===mint && l.result==="BUY"; });
                if(le){ le.result="SKIP"; le.reason="No Jupiter route"; }
                render();
                return;
              }
              found = true;
              S.balance -= TRADE_SIZE;
              var tr = {
                id: Date.now(),
                mint:mint, name:dx.name, sym:dx.sym,
                sig:res2.sig, checks:res2.checks,
                entryPrice:dx.price, curPrice:dx.price,
                entryLiq:dx.liq, tokensOut:parseInt(q.outAmount||0),
                invested:TRADE_SIZE, pnl:0, mult:1,
                phase:1, holdPct:1.0,
                returns:[], peakVol:dx.vol1||0,
                entryTime:Date.now(), paper:S.paperMode,
              };
              S.activeTrades.push(tr);
              showToast("◈ BOUGHT "+dx.sym+" · "+res2.sig+" · $"+TRADE_SIZE,"#22c55e");
              if(!S.paperMode) window.open("https://jup.ag/swap/SOL-"+mint,"_blank");
              render();
            });
          });
      });
    });

    return chain;
  }).catch(function(e){
    console.log("Scan err:",e);
  }).then(function(){
    S.scanning = false;
    render();
  });
}

// ══════════════════════════════════════
//  PRICE TICK
// ══════════════════════════════════════
function priceTick(){
  if(!S.botRunning || !S.activeTrades.length) return;

  var promises = S.activeTrades.map(function(tr){
    return getDexData(tr.mint).then(function(dx){
      if(!dx || !dx.price) return;
      tr.curPrice = dx.price;
      tr.pnl = ((dx.price - tr.entryPrice)/tr.entryPrice)*100;
      tr.mult = 1 + tr.pnl/100;
      if(dx.vol1 > tr.peakVol) tr.peakVol = dx.vol1;

      // Stop loss phase 1
      if(tr.phase===1 && tr.pnl <= -(SL_PCT*100)){
        var ret = tr.invested*(1-SL_PCT);
        S.balance += ret;
        S.totalPnl -= tr.invested*SL_PCT;
        closeTrade(tr,"Stop-loss -40%",ret);
        showToast("💀 "+tr.sym+" -40% · recovered "+fU(ret),"#f87171");
        addLoss();
        if(!S.paperMode) window.open("https://jup.ag/swap/"+tr.mint+"-SOL","_blank");
        return;
      }

      // Exit rules
      for(var i=0;i<EXIT_RULES.length;i++){
        var rule = EXIT_RULES[i];
        if(tr.phase===rule.phase && tr.mult>=rule.target){
          var sellUsd = tr.invested * tr.holdPct * rule.sell * tr.mult;
          tr.returns.push({label:rule.label+" sell", usd:sellUsd});
          tr.holdPct = tr.holdPct * (1 - rule.sell);
          tr.phase++;
          S.balance += sellUsd;
          S.totalPnl += sellUsd;
          addWin();
          var emoji = rule.label==="2x"?"🎯":rule.label==="5x"?"🚀":"💎";
          showToast(emoji+" "+tr.sym+" "+rule.label+"! +"+fU(sellUsd),"#22c55e");
          if(!S.paperMode) window.open("https://jup.ag/swap/"+tr.mint+"-SOL","_blank");
          break;
        }
      }

      // Moonbag exit (phase 4)
      if(tr.phase===4){
        var hm = (Date.now()-tr.entryTime)/60000;
        var sigs = 0;
        if(dx.ch1 < -20) sigs++;
        if(tr.peakVol>0 && dx.vol1 < tr.peakVol*0.35) sigs++;
        if(dx.liq < tr.entryLiq*0.78) sigs++;
        if(hm>45 && Math.random()<0.10) sigs++;
        if(sigs>=2){
          var mv = tr.invested * tr.holdPct * tr.mult;
          S.balance += mv;
          S.totalPnl += mv;
          closeTrade(tr,"🌙 Moonbag closed ("+sigs+" signals)",mv);
          showToast("🌙 "+tr.sym+" moonbag → "+fU(mv),"#a78bfa");
          if(tr.pnl>0) addWin(); else addLoss();
          if(!S.paperMode) window.open("https://jup.ag/swap/"+tr.mint+"-SOL","_blank");
        }
      }
    });
  });

  Promise.all(promises).then(function(){
    S.portfolioVal = S.balance + S.activeTrades.reduce(function(s,t){
      return s + t.invested * t.holdPct * Math.max(1+(t.pnl||0)/100, 0.01);
    },0);
    render();
  }).catch(function(e){ console.log("Tick err:",e); });
}

function closeTrade(tr, reason, exitUsd){
  S.activeTrades = S.activeTrades.filter(function(t){ return t.id!==tr.id; });
  S.closedTrades.unshift(Object.assign({},tr,{exitReason:reason,exitUsd:exitUsd,closedAt:Date.now()}));
  if(S.closedTrades.length>60) S.closedTrades.pop();
}
function addWin(){ S.wins++; S.losses=0; if(S.wins>=1&&S.botMode==="STRICT")S.botMode="RECOVERY"; if(S.wins>=2&&S.botMode==="RECOVERY")S.botMode="NORMAL"; }
function addLoss(){ S.losses++; S.wins=0; if(S.losses>=3)S.botMode="STRICT"; }

function manualSell(id, pct){
  var tr = S.activeTrades.find(function(t){ return t.id===id; });
  if(!tr) return;
  var cv = tr.invested * tr.holdPct * Math.max(1+(tr.pnl||0)/100, 0.01);
  var sv = cv * pct;
  S.balance += sv;
  showToast("✋ "+tr.sym+" sold "+Math.round(pct*100)+"% → +"+fU(sv),"#f59e0b");
  if(!S.paperMode) window.open("https://jup.ag/swap/"+tr.mint+"-SOL","_blank");
  if(pct>=1){
    closeTrade(tr,"Manual "+Math.round(pct*100)+"%",sv);
    if(tr.pnl>0) addWin(); else addLoss();
  } else {
    tr.holdPct *= (1-pct);
  }
  render();
}

function startBot(){
  if(!S.heliusKey){ showToast("⚠ Enter Helius API key in Settings","#f59e0b"); return; }
  S.botRunning = true;
  clearInterval(S.scanTimer); clearInterval(S.priceTimer); clearInterval(S.balTimer);
  S.scanTimer  = setInterval(scanCycle, SCAN_MS);
  S.priceTimer = setInterval(priceTick, TICK_MS);
  if(!S.paperMode){
    fetchWalletBalance();
    S.balTimer = setInterval(fetchWalletBalance, BAL_MS);
  }
  scanCycle();
  showToast("▶ Bot started · "+(S.paperMode?"PAPER":"LIVE"),"#22c55e");
  render();
}

function stopBot(){
  S.botRunning = false;
  clearInterval(S.scanTimer); clearInterval(S.priceTimer); clearInterval(S.balTimer);
  showToast("■ Bot stopped","#f87171");
  render();
}

// ══════════════════════════════════════
//  PHANTOM
// ══════════════════════════════════════
function connectPhantom(){
  if(window.solana && window.solana.isPhantom){
    window.solana.connect().then(function(resp){
      S.walletPubkey = resp.publicKey.toString();
      persist();
      if(!S.paperMode) fetchWalletBalance();
      showToast("✅ Connected · "+sh(S.walletPubkey),"#22c55e");
      render();
    }).catch(function(){
      showToast("Phantom connection cancelled","#f87171");
    });
  } else {
    var url = encodeURIComponent(window.location.href);
    window.location.href = "https://phantom.app/ul/browse/"+url+"?ref="+url;
  }
}

// ══════════════════════════════════════
//  COPY CA
// ══════════════════════════════════════
function copyCA(addr, btnId){
  try{
    if(navigator.clipboard){
      navigator.clipboard.writeText(addr);
    } else {
      var el=document.createElement("textarea");
      el.value=addr; el.style.position="fixed"; el.style.opacity="0";
      document.body.appendChild(el); el.focus(); el.select();
      document.execCommand("copy"); document.body.removeChild(el);
    }
  }catch(e){}
  showToast("CA copied ✓","#22c55e");
  var btn = btnId ? getEl(btnId) : null;
  if(btn){
    var orig = btn.innerHTML;
    btn.innerHTML = "<span style='color:#22c55e;font-size:10px;font-weight:bold'>✓ COPIED</span>";
    setTimeout(function(){ btn.innerHTML=orig; },2000);
  }
}

function toggleLog(idx){
  if(S.scanLog[idx]) S.scanLog[idx].expanded = !S.scanLog[idx].expanded;
  render();
}

// ══════════════════════════════════════
//  MANUAL SCANNER
// ══════════════════════════════════════
function runManualScan(){
  var inp = getEl("sinp");
  var mint = inp ? inp.value.trim() : "";
  if(!mint){ showToast("Enter a contract address","#f59e0b"); return; }
  var res = getEl("sres");
  if(res) res.innerHTML = "<div style='padding:20px;text-align:center;color:#22c55e;font-size:11px'>● Fetching live data…</div>";

  Promise.all([getDexData(mint), getHeliusData(mint)]).then(function(data){
    var dx=data[0], hx=data[1];
    if(!dx){
      if(res) res.innerHTML="<div style='padding:10px;color:#f87171;font-size:11px'>Token not found on Dexscreener</div>";
      return;
    }
    var token={mint:mint,name:dx.name,sym:dx.sym,price:dx.price,liq:dx.liq,
      vol24:dx.vol24,age:dx.age,top10:hx&&hx.top10||0,
      mintAuth:hx&&hx.mintAuth||false,freezeAuth:hx&&hx.freezeAuth||false,

function phaseRoadHTML(tr){
  var phase=tr.phase, mult=tr.mult||1;
  var pcts=[0,25,50,75,100];
  var fill=0;
  if(phase===1) fill=Math.min((Math.log(Math.max(mult,1))/Math.log(2))*25,25);
  else if(phase===2) fill=25+Math.min(((mult-2)/3)*25,25);
  else if(phase===3) fill=50+Math.min(((mult-5)/5)*25,25);
  else fill=75;

  var fc=phase===4?"#a78bfa":mult>5?"#22c55e":mult>2?"#f59e0b":"#22c55e33";
  var dots=[{l:"IN",p:0,d:true},{l:"2x",p:25,d:phase>=2},{l:"5x",p:50,d:phase>=3},{l:"10x",p:75,d:phase>=4},{l:"🌙",p:100,d:false}];
  var html="<div style='position:relative;height:40px;margin:12px 0 18px'>"
    +"<div style='position:absolute;top:12px;left:18px;right:18px;height:2px;background:#111;border-radius:99px'>"
    +"<div style='height:100%;background:"+fc+";width:"+fill+"%;border-radius:99px;transition:width 1.2s'></div></div>";
  dots.forEach(function(d){
    var off = d.p===0?0:d.p===100?18:10;
    html+="<div style='position:absolute;top:2px;left:calc("+d.p+"% - "+off+"px);display:flex;flex-direction:column;align-items:center;gap:3px'>"
      +"<div style='width:22px;height:22px;border-radius:50%;background:"+(d.d?"#22c55e":"#111")+";border:2px solid "+(d.d?"#22c55e":"#1e1e1e")+";display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:bold;"+(d.d?"box-shadow:0 0 8px #22c55e55":"")+"'>"+(d.d?"✓":"")+"</div>"
      +"<span style='font-size:8px;font-weight:bold;color:"+(d.d?"#22c55e":d.l==="10x"||d.l==="🌙"?"#333":"#1a1a1a")+"'>"+d.l+"</span></div>";
  });
  return html+"</div>";
}

function tradeCardHTML(tr){

  var cv=tr.invested*tr.holdPct*Math.max(mult,0.01);

  var phaseLabels=["","RIDING TO 2x","RIDING TO 5x","RIDING TO 10x","🌙 MOONBAG"];

  return "<div style='background:#0c0c0c;border:1px solid "+(phase===4?"#a78bfa33":pnl>50?"#22c55e33":pnl<-15?"#f8717122":"#1a1a1a")+";border-radius:14px;padding:14px;margin-bottom:10px'>"
    // header

    +(tr.paper?"<span style='font-size:8px;color:#f59e0b;margin-left:6px'>PAPER</span>":"")

    +c(tr.sig,sigCol)+c(phaseLabels[phase],phaseColors[phase])+"</div></div>"

    +ccaBtn(tr.mint, uid)
    // road
    +phaseRoadHTML(tr)
    // multiplier
    +"<div style='text-align:center;margin:6px 0 12px'>"
    +"<div style='font-size:38px;font-weight:bold;color:"+pC(pnl)+";letter-spacing:-2px;line-height:1'>"+mult.toFixed(2)+"x</div>"
    +"<div style='font-size:11px;color:"+pC(pnl)+";margin-top:2px'>"+fP(pnl)+"</div></div>"
    // breakdown
    +"<div style='background:#080808;border:1px solid #111;border-radius:10px;padding:10px 12px;margin-bottom:10px'>"
    +"<div style='font-size:8px;color:#1a1a1a;font-weight:bold;letter-spacing:.5px;margin-bottom:7px'>POSITION</div>"
    +"<div style='display:flex;justify-content:space-between;margin-bottom:4px'><span style='font-size:10px;color:#333'>Invested</span><span style='font-size:10px;color:#555'>"+fU(tr.invested)+"</span></div>"
    +tr.returns.map(function(r){
      return "<div style='display:flex;justify-content:space-between;margin-bottom:4px'><span style='font-size:10px;color:#22c55e'>✓ "+r.label+"</span><span style='font-size:10px;color:#22c55e;font-weight:bold'>+"+fU(r.usd)+"</span></div>";
    }).join("")

    +"<div style='display:flex;justify-content:space-between;margin-bottom:4px'><span style='font-size:10px;color:#333'>Entry</span><span style='font-size:10px;color:#555'>$"+tr.entryPrice.toFixed(8)+"</span></div>"
    +"<div style='display:flex;justify-content:space-between'>  <span style='font-size:10px;color:#444'>Now</span><span style='font-size:10px;color:"+pC(pnl)+";font-weight:bold'>$"+tr.curPrice.toFixed(8)+"</span></div>"
    +(totalRet>0?"<div style='display:flex;justify-content:space-between;border-top:1px solid #111;padding-top:4px;margin-top:4px'><span style='font-size:10px;color:#22c55e88'>Total returned</span><span style='font-size:10px;color:#22c55e;font-weight:bold'>+"+fU(totalRet)+"</span></div>":"")
    +"</div>"

    +"<span style='font-size:9px;color:"+(pnl<=-25?"#f87171":"#333")+"'>"+fP(pnl)+"</span></div>"
    +"<div style='height:3px;background:#111;border-radius:99px;overflow:hidden'>"
    +"<div style='height:100%;border-radius:99px;transition:width 0.8s;width:"+Math.min(Math.max((pnl+40)/140*100,0),100)+"%;background:"+(pnl<-25?"#f87171":pnl<-10?"#f59e0b":"#22c55e33")+"'></div></div></div>":"")
    // manual sell
    +"<div style='font-size:8px;color:#2a2a2a;font-weight:bold;letter-spacing:.5px;margin-bottom:6px'>MANUAL EXIT</div>"

    +"<div style='font-size:26px;font-weight:bold;letter-spacing:-1px;line-height:1.1;color:"+(S.paperMode?(S.portfolioVal>=10?"#22c55e":"#f87171"):"#22c55e")+"'>"+fU(S.portfolioVal)+"</div>"
    +(S.paperMode?"<div style='font-size:10px;color:"+(pr>=0?"#22c55e88":"#f8717188")+"'>"+fP(pr)+"</div>"
    :"<div style='font-size:9px;color:#333'>"+(S.walletPubkey?sh(S.walletPubkey):"not connected")+"</div>")
    +"</div></div>"
    +"<div style='display:flex;gap:8px;margin-top:10px'>"
    +"<button onclick='"+(S.botRunning?"stopBot()":"startBot()")+"' style='flex:1;padding:9px;border-radius:8px;font-size:10px;font-weight:bold;background:"+(S.botRunning?"#f8717122":"#22c55e22")+";color:"+(S.botRunning?"#f87171":"#22c55e")+";border:1px solid "+(S.botRunning?"#f8717144":"#22c55e44")+";cursor:pointer'>"+(S.botRunning?"■ STOP BOT":"▶ START BOT")+"</button>"
    +"<button onclick='goSetup()' style='padding:9px 14px;border-radius:8px;background:#111;color:#555;border:1px solid #1a1a1a;font-size:14px;cursor:pointer'>⚙</button>"
    +"</div>"
    +"<div style='margin-top:9px;display:flex;gap:8px;align-items:center'>"
    +"<div style='flex:1;height:2px;background:#0d0d0d;border-radius:99px;overflow:hidden'><div style='height:100%;background:"+(pr>=0?"#22c55e":"#f87171")+";width:"+Math.min((S.portfolioVal/10)*50,100)+"%;transition:width 1s;border-radius:99px'></div></div>"
    +"<span style='font-size:8px;color:#222;white-space:nowrap'>Cash: <span style='color:#333'>"+fU(S.balance)+"</span></span>"
    +"</div></div>"

    // TABS
    +"<div style='display:flex;background:#050505;border-bottom:1px solid #111;position:sticky;top:0;z-index:99'>"+tabBtns+"</div>"

    // PANE
    +"<div style='padding:"+(S.tab==="log"?"0":"14px")+"'>"
    +posContent+scanContent+histContent+logContent
    +"</div>";
}

function renderSetup(){
  var connected=!!S.walletPubkey;
  return "<div style='padding:24px 16px 40px'>"
    +"<div style='text-align:center;margin-bottom:28px;padding-top:20px'>"
    +"<div style='font-size:36px;color:#22c55e;margin-bottom:8px'>◈</div>"
    +"<div style='font-size:20px;font-weight:bold;color:#fff'>REX BOT</div>"
    +"<div style='font-size:10px;color:#333;margin-top:4px'>Solana · 2x→5x→10x→🌙</div></div>"

    // Phantom
    +"<button onclick='connectPhantom()' style='width:100%;padding:15px;border-radius:13px;background:linear-gradient(135deg,#534bb1,#551bf9);color:#fff;font-size:14px;font-weight:bold;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:10px;border:none;cursor:pointer'>"
    +"<span style='font-size:18px'>👻</span>"
    +(connected?"✓ Connected · "+sh(S.walletPubkey):"Connect Phantom Wallet")+"</button>"

    // Warning
    +"<div style='background:#f59e0b0d;border:1px solid #f59e0b22;border-radius:10px;padding:10px 12px;margin-bottom:16px;font-size:9px;color:#f59e0b88;line-height:1.6'>"
    +"⚠ Keys stored only in your browser's local storage — never sent anywhere. Only trade what you can afford to lose.</div>"

    // Helius key
    +"<div style='margin-bottom:16px'>"
    +"<div style='font-size:9px;color:#444;font-weight:bold;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px'>Helius API Key</div>"
    +"<input id='hkeyinp' type='password' placeholder='Paste Helius API key…' value='"+S.heliusKey+"' oninput=\"S.heliusKey=this.value\" style='width:100%;padding:11px 13px;border-radius:9px;background:#0c0c0c;border:1px solid #1e1e1e;color:#fff;font-size:13px;font-family:monospace'/>"
    +"<div style='font-size:9px;color:#333;margin-top:5px'>Free key → dashboard.helius.dev</div></div>"

    // Mode
    +"<div style='margin-bottom:16px'>"
    +"<div style='font-size:9px;color:#444;font-weight:bold;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px'>Trading Mode</div>"
    +"<div style='display:flex;gap:8px;margin-bottom:8px'>"
    +"<button onclick=\"S.paperMode=true;render()\" style='flex:1;padding:11px;border-radius:9px;font-size:10px;font-weight:bold;background:"+(S.paperMode?"#f59e0b1a":"#0c0c0c")+";color:"+(S.paperMode?"#f59e0b":"#333")+";border:1px solid "+(S.paperMode?"#f59e0b44":"#1a1a1a")+";cursor:pointer'>📄 PAPER (Safe)</button>"
    +"<button onclick=\"S.paperMode=false;render()\" style='flex:1;padding:11px;border-radius:9px;font-size:10px;font-weight:bold;background:"+(!S.paperMode?"#f871711a":"#0c0c0c")+";color:"+(!S.paperMode?"#f87171":"#333")+";border:1px solid "+(!S.paperMode?"#f8717144":"#1a1a1a")+";cursor:pointer'>🔴 LIVE</button>"
    +"</div>"
    +(!S.paperMode?"<div style='font-size:9px;color:#f87171'>⚠ LIVE opens Jupiter in Phantom. You confirm every swap.</div>":"")
    +(!S.paperMode&&S.walletPubkey?"<div style='font-size:9px;color:#22c55e;margin-top:4px'>✓ Real wallet balance shown from Helius</div>":"")
    +"</div>"

    // Strategy
    +"<div style='background:#080808;border:1px solid #111;border-radius:10px;padding:12px 14px;margin-bottom:20px'>"
    +"<div style='font-size:8px;color:#2a2a2a;font-weight:bold;margin-bottom:8px'>EXIT STRATEGY</div>"
    +"<div style='display:flex;justify-content:space-around'>"
    +[["$5","Entry"],["2x","Sell 80%"],["5x","Sell 50%"],["10x","Sell 50%"],["🌙","Moon"]].map(function(kv){
      return "<div style='text-align:center'><div style='font-size:10px;font-weight:bold;color:#444'>"+kv[0]+"</div><div style='font-size:7px;color:#1a1a1a;margin-top:2px'>"+kv[1]+"</div></div>";
    }).join("")
    +"</div>"
    +"<div style='margin-top:8px;font-size:8px;color:#1a1a1a;text-align:center'>Stop-loss -40% · 3-layer strategy filter</div></div>"

    // Launch
    +"<button onclick='launch()' style='width:100%;padding:15px;border-radius:13px;background:#22c55e1a;color:#22c55e;border:1px solid #22c55e44;font-size:15px;font-weight:bold;cursor:pointer'>Launch Dashboard →</button>"
    +"</div>";
}

function setTab(t){ S.tab=t; render(); window.scrollTo(0,0); }
function goSetup(){ S.screen="setup"; render(); }
function launch(){
  if(!S.heliusKey.trim()){ showToast("⚠ Enter your Helius API key","#f59e0b"); return; }
  persist();
  S.screen="dashboard";
  if(!S.paperMode && S.walletPubkey) fetchWalletBalance();
  else S.portfolioVal=S.balance;
  render();
}

// BOOT
hydrate();
if(S.heliusKey) S.screen="dashboard";
render();

} catch(err) {
  // Show error on screen so we can debug
  document.getElementById("root").innerHTML =
    "<div style='padding:20px;color:#f87171;font-size:12px'>"
    +"<div style='font-size:16px;margin-bottom:10px'>⚠ Error loading app</div>"
    +"<div style='background:#111;padding:10px;border-radius:8px;font-family:monospace;font-size:10px;word-break:break-all'>"+err.message+"</div>"
    +"<div style='margin-top:10px;font-size:10px;color:#555'>Open browser console for details</div>"
    +"</div>";
  console.error("REX BOT error:", err);
}
</script>

</body>
</html>
