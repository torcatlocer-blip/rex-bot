<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>

<title>◈ REX BOT</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
html,body{background:#050505!important;color:#fff;margin:0;padding:0;min-height:100vh;-webkit-text-size-adjust:100%;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:'JetBrains Mono',monospace;}
body{max-width:480px;margin:0 auto;padding-bottom:100px;overscroll-behavior:none;}
button{cursor:pointer;border:none;outline:none;background:none;}
input{outline:none;}
a{color:inherit;text-decoration:none;}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#1a1a1a}

#toast{
position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-20px);
background:#111;border-radius:10px;padding:10px 18px;
font-size:11px;font-weight:800;z-index:9999;pointer-events:none;
opacity:0;transition:all 0.3s;max-width:88vw;
white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
border:1px solid #333;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.hdr{padding:18px 16px 12px;border-bottom:1px solid #111;
position:sticky;top:0;background:#050505;z-index:100;}
.tabs{display:flex;background:#050505;border-bottom:1px solid #111;
position:sticky;top:0;z-index:99;}
.tbtn{flex:1;padding:10px 0;font-size:8px;font-weight:800;letter-spacing:.8px;
color:#2a2a2a;border-bottom:2px solid transparent;transition:all .15s;}
.tbtn.on{color:#22c55e;border-bottom-color:#22c55e;}
.pane{display:none;padding:14px;}
.pane.on{display:block;}

.card{background:#0c0c0c;border:1px solid #1a1a1a;border-radius:14px;padding:14px;margin-bottom:10px;}
.inset{background:#080808;border:1px solid #111;border-radius:10px;padding:10px 12px;margin-bottom:10px;}
.chip{display:inline-block;padding:2px 8px;border-radius:99px;font-size:9px;font-weight:800;white-space:nowrap;}
.stat4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px;}
.scard{background:#0c0c0c;border:1px solid #1a1a1a;border-radius:9px;padding:8px 0;text-align:center;}
.bar{height:3px;background:#111;border-radius:99px;overflow:hidden;margin:4px 0;}
.barf{height:100%;border-radius:99px;transition:width 1s ease;}
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:10px;}
.sbtn{padding:8px 0;border-radius:8px;font-size:9px;font-weight:800;}
.inp{width:100%;padding:11px 13px;border-radius:9px;background:#0c0c0c;
border:1px solid #1e1e1e;color:#fff;font-size:13px;}
.inp::placeholder{color:#333;}
.row{display:flex;justify-content:space-between;align-items:center;}

/* setup */
.setup{padding:24px 16px 40px;}
.phan-btn{width:100%;padding:15px;border-radius:13px;
background:linear-gradient(135deg,#534bb1,#551bf9);
color:#fff;font-size:14px;font-weight:800;margin-bottom:14px;
display:flex;align-items:center;justify-content:center;gap:10px;
border:none;cursor:pointer;}
.warn{background:#f59e0b0d;border:1px solid #f59e0b22;border-radius:10px;
padding:10px 12px;margin-bottom:16px;font-size:9px;color:#f59e0b88;line-height:1.6;}
.lbl{font-size:9px;color:#444;font-weight:800;letter-spacing:.5px;
text-transform:uppercase;margin-bottom:6px;display:block;}
.grp{margin-bottom:16px;}
.launch-btn{width:100%;padding:15px;border-radius:13px;
background:#22c55e1a;color:#22c55e;border:1px solid #22c55e44;
font-size:15px;font-weight:800;}
.mode-row{display:flex;gap:8px;margin-bottom:8px;}
.mode-btn{flex:1;padding:11px;border-radius:9px;font-size:10px;font-weight:800;}

/* road */
.road{position:relative;height:40px;margin:12px 0 18px;}
.road-line{position:absolute;top:12px;left:20px;right:20px;height:2px;background:#111;border-radius:99px;}
.road-prog{height:100%;border-radius:99px;transition:width 1.2s ease;}
.rdot{position:absolute;top:2px;display:flex;flex-direction:column;align-items:center;gap:3px;}
.rcirc{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;
justify-content:center;font-size:10px;font-weight:800;transition:all .5s;}

/* copy ca */
.cca{display:flex;align-items:center;gap:6px;background:#0d0d0d;
border:1px solid #1a1a1a;border-radius:8px;padding:8px 11px;
width:100%;margin-top:7px;transition:all .2s;cursor:pointer;}
.cca.ok{background:#22c55e0d;border-color:#22c55e33;}

@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.blink{animation:blink 1.5s infinite;}
.fu{animation:fadeUp .3s ease;}

/* check row */
.cr{display:flex;gap:8px;padding:4px 0;border-bottom:1px solid #0d0d0d;align-items:center;}
</style>

</head>
<body>
<div id="toast"></div>
<div id="app"></div>

<script>
// ═══════════════════════════════════
//  STATE
// ═══════════════════════════════════
const S = {
  screen:"setup",
  heliusKey:"",
  walletPubkey:"",
  paperMode:true,
  botRunning:false,
  botMode:"NORMAL",
  balance:10,
  portfolioVal:10,
  totalPnlUsd:0,
  activeTrades:[],
  closedTrades:[],
  scanLog:[],
  losses:0,
  wins:0,
  blacklist:new Set(),
  scanning:false,
  tab:"trade",
  scanTimer:null,
  priceTimer:null,
};

const TRADE_SIZE   = 5;
const SL_PCT       = 0.40;
const TARGET_10X   = 10.0;
const SELL_70      = 0.70;
const MOON_30      = 0.30;
const SCAN_MS      = 20000;
const TICK_MS      = 10000;
const MAX_OPEN     = 2;
const SOL_MINT     = "So11111111111111111111111111111111111111112";

// ── utils ──
const $  = id => document.getElementById(id);
const fU = n  => `$${Math.abs(n).toFixed(2)}`;
const fP = n  => `${n>=0?"+":""}${n.toFixed(1)}%`;
const pC = n  => n>0?"#22c55e":n<0?"#f87171":"#888";
const sh = a  => a?`${a.slice(0,5)}…${a.slice(-4)}`:"";
const ag = ts => { const s=Math.floor((Date.now()-ts)/1000); return s<60?`${s}s`:`${Math.floor(s/60)}m`; };
const mc = {NORMAL:"#22c55e",STRICT:"#f87171",RECOVERY:"#f59e0b"};

function toast(msg,col="#22c55e"){
  const el=$("toast");
  el.textContent=msg; el.style.color=col;
  el.style.borderColor=col+"55";
  el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"),3600);
}

function persist(){
  try{
    localStorage.setItem("rx_hk", S.heliusKey);
    localStorage.setItem("rx_pk", S.walletPubkey);
    localStorage.setItem("rx_pm", S.paperMode?"1":"0");
  }catch(e){}
}
function hydrate(){
  try{
    S.heliusKey    = localStorage.getItem("rx_hk")||"";
    S.walletPubkey = localStorage.getItem("rx_pk")||"";
    S.paperMode    = localStorage.getItem("rx_pm")!=="0";
  }catch(e){}
}

// ═══════════════════════════════════
//  API CALLS
// ═══════════════════════════════════
async function dexData(mint){
  try{
    const r = await fetch(`https://api.dexscreener.com/latest/dex/tokens/${mint}`);
    const d = await r.json();
    if(!d.pairs?.length) return null;
    const pairs = d.pairs.filter(p=>p.chainId==="solana")
      .sort((a,b)=>(b.liquidity?.usd||0)-(a.liquidity?.usd||0));
    if(!pairs.length) return null;
    const p = pairs[0];
    return {
      liq:   p.liquidity?.usd||0,
      vol24: p.volume?.h24||0,
      vol1:  p.volume?.h1||0,
      price: parseFloat(p.priceUsd)||0,
      buys:  p.txns?.h24?.buys||0,
      sells: p.txns?.h24?.sells||0,
      ch1:   p.priceChange?.h1||0,
      ch24:  p.priceChange?.h24||0,
      age:   p.pairCreatedAt?(Date.now()-p.pairCreatedAt)/60000:null,
      name:  p.baseToken?.name||"Unknown",
      sym:   p.baseToken?.symbol||"???",
    };
  }catch(e){return null;}
}

async function heliusData(mint){
  if(!S.heliusKey) return null;
  const rpc = `https://mainnet.helius-rpc.com/?api-key=${S.heliusKey}`;
  try{
    const [mR,hR] = await Promise.all([
      fetch(rpc,{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({jsonrpc:"2.0",id:1,method:"getAccountInfo",
          params:[mint,{encoding:"jsonParsed"}]})}),
      fetch(rpc,{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({jsonrpc:"2.0",id:2,method:"getTokenLargestAccounts",
          params:[mint]})}),
    ]);
    const mD = await mR.json();
    const hD = await hR.json();
    const info = mD.result?.value?.data?.parsed?.info;
    let top10=0;
    if(hD.result?.value){
      const accs=hD.result.value;
      const tot=accs.reduce((s,a)=>s+parseFloat(a.uiAmount||0),0);
      const t10=accs.slice(0,10).reduce((s,a)=>s+parseFloat(a.uiAmount||0),0);
      top10=tot>0?(t10/tot)*100:0;
    }
    return {
      mintAuth:  !!info?.mintAuthority,
      freezeAuth:!!info?.freezeAuthority,
      top10,
    };
  }catch(e){return null;}
}

async function jupQuote(inMint,outMint,amount){
  try{
    const r=await fetch(`https://quote-api.jup.ag/v6/quote?inputMint=${inMint}&outputMint=${outMint}&amount=${amount}&slippageBps=100`);
    return r.json();
  }catch(e){return null;}
}

async function solPrice(){
  try{
    const r=await fetch("https://price.jup.ag/v4/price?ids=SOL");
    const d=await r.json();
    return d.data?.SOL?.price||150;
  }catch{return 150;}
}

async function trending(){
  try{
    const r=await fetch("https://api.dexscreener.com/latest/dex/search?q=sol");
    const d=await r.json();
    if(!d.pairs) return [];
    return d.pairs
      .filter(p=>p.chainId==="solana"&&(p.liquidity?.usd||0)>5000
        &&p.pairCreatedAt&&(Date.now()-p.pairCreatedAt)<6*3600000)
      .sort((a,b)=>(b.volume?.h1||0)-(a.volume?.h1||0))
      .slice(0,8).map(p=>p.baseToken?.address).filter(Boolean);
  }catch(e){return[];}
}

// ═══════════════════════════════════
//  STRATEGY
// ═══════════════════════════════════
function strategy(token){
  const mode=S.botMode;
  const checks=[];let pass=true,reason=null;
  const fail=(l,r)=>{checks.push({l,s:"REJECT",r});if(pass){pass=false;reason=`${l}: ${r}`;}};
  const ok  =(l,r)=>checks.push({l,s:"PASS",r});
  const skip=(l,r)=>checks.push({l,s:"SKIP",r});

  // L1
  const lf=mode==="STRICT"?10000:5000;
  token.liq<lf?fail("Liquidity",`$${token.liq?.toFixed(0)}<$${lf}`):ok("Liquidity",`$${token.liq?.toFixed(0)}`);
  if(token.mintAuth)fail("Mint Auth","Active — infinite supply");
  else if(token.freezeAuth)fail("Freeze Auth","Active");
  else ok("Perms","Clean");
  if(S.blacklist.has(token.mint))fail("Blacklist","Flagged deployer");
  else ok("Blacklist","Clear");
  if(!pass)return{pass,reason,checks,sig:null};

  // L2
  const cl=mode==="STRICT"?15:40;
  const t10=token.top10||0;
  t10>cl?fail("Concentration",`${t10.toFixed(0)}%>${cl}%`):ok("Concentration",`${t10.toFixed(0)}%`);
  const txns=(token.buys||0)+(token.sells||0);
  const bs=txns>0&&(token.buys/txns)>0.88?70:35;
  bs>55?fail("Bot Score",`${bs}`):ok("Bot Score",`${bs} clean`);
  const vlr=token.liq>0?token.vol24/token.liq:0;
  vlr>20?fail("Vol/Liq",`${vlr.toFixed(1)}x`):ok("Vol/Liq",`${vlr.toFixed(1)}x`);
  if(token.age>=120){
    const fr=0.0025;
    fr<0.008?fail("Fee Ratio","Farmed"):ok("Fee Ratio",`${(fr*100).toFixed(2)}%`);
  }else skip("Fee Ratio",`${token.age?.toFixed(0)}min old`);
  if(!pass)return{pass,reason,checks,sig:null};

  // L3
  const mom=Math.min((token.ch1+50),100);
  const vs=Math.min(token.vol24/10000*40,100);
  const ns=mom*0.5+vs*0.5;
  const sig=ns>=65?"STRONG":ns>=40?"WEAK":"NO_SIGNAL";
  ok("Narrative",`${ns.toFixed(0)} → ${sig}`);
  if(sig==="NO_SIGNAL")return{pass:false,reason:`Narrative ${ns.toFixed(0)}<40`,checks,sig};
  return{pass:true,reason:null,checks,sig};
}

// ═══════════════════════════════════
//  BOT LOOP
// ═══════════════════════════════════
async function scanCycle(){
  if(!S.botRunning)return;
  const p1=S.activeTrades.filter(t=>t.phase===1).length;
  if(p1>0||S.activeTrades.length>=MAX_OPEN)return;
  if(S.balance<TRADE_SIZE){toast("⚠ Need $5 to trade","#f59e0b");return;}
  S.scanning=true;render();
  try{
    const mints=await trending();
    for(const mint of mints){
      if(S.activeTrades.find(t=>t.mint===mint)||S.blacklist.has(mint))continue;
      const [dx,hx]=await Promise.all([dexData(mint),heliusData(mint)]);
      if(!dx)continue;
      const token={mint,name:dx.name,sym:dx.sym,price:dx.price,liq:dx.liq,
        vol24:dx.vol24,age:dx.age,top10:hx?.top10||0,
        mintAuth:hx?.mintAuth||false,freezeAuth:hx?.freezeAuth||false,
        buys:dx.buys,sells:dx.sells,ch1:dx.ch1};
      const res=strategy(token);
      addLog({time:Date.now(),sym:token.sym,result:res.pass?"BUY":"SKIP",
        reason:res.pass?`${res.sig} signal`:res.reason?.slice(0,42),mint});
      if(res.pass){
        const sp=await solPrice();
        const lamps=Math.floor((TRADE_SIZE/sp)*1e9);
        const q=await jupQuote(SOL_MINT,mint,lamps);
        if(!q||q.error){addLog({time:Date.now(),sym:token.sym,result:"SKIP",reason:"No Jupiter route",mint});continue;}
        S.balance-=TRADE_SIZE;
        const tr={id:Date.now(),mint,name:token.name,sym:token.sym,
          sig:res.sig,checks:res.checks,
          entryPrice:token.price,curPrice:token.price,
          entryLiq:token.liq,tokensOut:parseInt(q.outAmount||0),
          invested:TRADE_SIZE,pnl:0,mult:1,phase:1,
          ret10x:0,hit10x:false,entryTime:Date.now(),paper:S.paperMode};
        S.activeTrades.push(tr);
        toast(`◈ BOUGHT ${token.sym} · ${res.sig} · $${TRADE_SIZE}`,"#22c55e");
        if(!S.paperMode){
          // Open Jupiter swap in new tab (Phantom handles signing)
          window.open(`https://jup.ag/swap/SOL-${mint}`,"_blank");
        }
        break;
      }
    }
  }catch(e){console.error("Scan:",e);}
  S.scanning=false;render();
}

async function priceTick(){
  if(!S.botRunning||!S.activeTrades.length)return;
  for(const tr of[...S.activeTrades]){
    try{
      const dx=await dexData(tr.mint);
      if(!dx||!dx.price)continue;
      tr.curPrice=dx.price;
      tr.pnl=((dx.price-tr.entryPrice)/tr.entryPrice)*100;
      tr.mult=1+tr.pnl/100;

      // Stop loss
      if(tr.phase===1&&tr.pnl<=-(SL_PCT*100)){
        const ret=tr.invested*(1-SL_PCT);
        S.balance+=ret;S.totalPnlUsd-=tr.invested*SL_PCT;
        closeT(tr,"Stop-loss -40%",ret);
        toast(`💀 ${tr.sym} -40% · recovered ${fU(ret)}`,"#f87171");
        addLoss();
        if(!S.paperMode)window.open(`https://jup.ag/swap/${tr.mint}-SOL`,"_blank");
        continue;
      }

      // 10x
      if(tr.phase===1&&tr.mult>=TARGET_10X&&!tr.hit10x){
        const sellVal=tr.invested*SELL_70*tr.mult;
        tr.phase=2;tr.hit10x=true;tr.ret10x=sellVal;
        S.balance+=sellVal;S.totalPnlUsd+=sellVal-tr.invested*SELL_70;
        addWin();
        toast(`🎯 ${tr.sym} 10x! Sold 70% → +${fU(sellVal)} · moonbag!`,"#22c55e");
        if(!S.paperMode)window.open(`https://jup.ag/swap/${tr.mint}-SOL`,"_blank");
      }

      // Moonbag exit
      if(tr.phase===2){
        const hm=(Date.now()-tr.entryTime)/60000;
        const sigs=
          (dx.ch1<-20?1:0)+
          (tr.peakVol&&dx.vol1<tr.peakVol*0.35?1:0)+
          (dx.liq<tr.entryLiq*0.78?1:0)+
          (hm>45&&Math.random()<0.12?1:0);
        if(!tr.peakVol||dx.vol1>tr.peakVol)tr.peakVol=dx.vol1;
        if(sigs>=2){
          const mv=tr.invested*MOON_30*tr.mult;
          S.balance+=mv;S.totalPnlUsd+=mv;
          closeT(tr,`Moonbag closed (${sigs} signals)`,mv);
          toast(`🌙 ${tr.sym} moonbag → ${fU(mv)}`,"#a78bfa");
          if(tr.pnl>0)addWin();else addLoss();
          if(!S.paperMode)window.open(`https://jup.ag/swap/${tr.mint}-SOL`,"_blank");
        }
      }
    }catch(e){console.error("Tick:",e);}
  }
  S.portfolioVal=S.balance+S.activeTrades.reduce((s,t)=>{
    const hp=t.phase===1?1.0:MOON_30;
    return s+t.invested*hp*Math.max(1+(t.pnl||0)/100,0.01);
  },0);
  render();
}

function closeT(tr,reason,exitUsd){
  S.activeTrades=S.activeTrades.filter(t=>t.id!==tr.id);
  S.closedTrades.unshift({...tr,exitReason:reason,exitUsd,closedAt:Date.now()});
  if(S.closedTrades.length>60)S.closedTrades.pop();
}
function addLog(e){S.scanLog.unshift(e);if(S.scanLog.length>80)S.scanLog.pop();}
function addWin(){S.wins++;S.losses=0;
  if(S.wins>=1&&S.botMode==="STRICT")S.botMode="RECOVERY";
  if(S.wins>=2&&S.botMode==="RECOVERY")S.botMode="NORMAL";}
function addLoss(){S.losses++;S.wins=0;if(S.losses>=3)S.botMode="STRICT";}

function manualSell(id,pct){
  const tr=S.activeTrades.find(t=>t.id===id);if(!tr)return;
  const hp=tr.phase===1?1.0:MOON_30;
  const mv=tr.invested*hp*Math.max(1+(tr.pnl||0)/100,0.01)*pct;
  S.balance+=mv;
  toast(`✋ ${tr.sym} sold ${Math.round(pct*100)}% → +${fU(mv)}`,"#f59e0b");
  if(!S.paperMode)window.open(`https://jup.ag/swap/${tr.mint}-SOL`,"_blank");
  if(pct>=1){
    closeT(tr,`Manual ${Math.round(pct*100)}%`,mv);
    if(tr.pnl>0)addWin();else addLoss();
  }else{
    tr.invested*=(1-hp*pct);
  }
  render();
}

function startBot(){
  if(!S.heliusKey){toast("⚠ Enter Helius API key in Settings","#f59e0b");return;}
  S.botRunning=true;S.portfolioVal=S.balance;
  clearInterval(S.scanTimer);clearInterval(S.priceTimer);
  S.scanTimer =setInterval(scanCycle,SCAN_MS);
  S.priceTimer=setInterval(priceTick,TICK_MS);
  scanCycle();
  toast("▶ Bot started · scanning Dexscreener…","#22c55e");
  render();
}
function stopBot(){
  S.botRunning=false;
  clearInterval(S.scanTimer);clearInterval(S.priceTimer);
  toast("■ Bot stopped","#f87171");render();
}

// ═══════════════════════════════════
//  PHANTOM — MOBILE DEEP LINK
// ═══════════════════════════════════
async function connectPhantom(){
  // If Phantom browser extension is injected (desktop)
  if(window.solana?.isPhantom){
    try{
      const resp=await window.solana.connect();
      S.walletPubkey=resp.publicKey.toString();
      persist();
      toast(`✅ Wallet connected · ${sh(S.walletPubkey)}`,"#22c55e");
      render();return;
    }catch(e){}
  }
  // Mobile: encode current URL and deep link into Phantom's in-app browser
  const currentUrl = encodeURIComponent(window.location.href);
  const ref        = encodeURIComponent(window.location.origin||window.location.href);
  // Phantom universal link for iOS/Android
  const phantomUrl = `https://phantom.app/ul/browse/${currentUrl}?ref=${ref}`;
  window.location.href = phantomUrl;
}

// ═══════════════════════════════════
//  COPY CA
// ═══════════════════════════════════
function copyCA(addr,btnId){
  const copy=()=>{
    navigator.clipboard.writeText(addr).catch(()=>{
      const el=document.createElement("textarea");
      el.value=addr;document.body.appendChild(el);
      el.select();document.execCommand("copy");
      document.body.removeChild(el);
    });
    const btn=$(btnId);
    if(btn){
      btn.classList.add("ok");
      btn.querySelector(".cl").textContent="✓ COPIED";
      setTimeout(()=>{
        btn.classList.remove("ok");
        if(btn.querySelector(".cl"))btn.querySelector(".cl").textContent="CA";
      },2000);
    }
    toast("Contract address copied","#22c55e");
  };
  copy();
}

// ═══════════════════════════════════
//  MANUAL SCANNER
// ═══════════════════════════════════
async function runScan(){
  const inp=$("sinp");
  const mint=inp?.value?.trim();

function chip(label,col,sm=false){
  return `<span class="chip" style="background:${col}18;color:${col};border:1px solid ${col}33;font-size:${sm?8:9}px">${label}</span>`;
}

function ccaHTML(mint,uid){
  return `<button id="${uid}" class="cca" onclick="copyCA('${mint}','${uid}')">
    <span class="cl" style="font-size:9px;color:#2a2a2a;font-weight:800;flex-shrink:0">CA</span>
    <span style="font-size:9px;color:#333;flex:1;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:monospace">${mint}</span>
    <span style="font-size:13px;color:#2a2a2a">⎘</span>
  </button>`;
}

function road10x(mult,phase){
  const lp=phase===1?Math.min((Math.log(Math.max(mult,1))/Math.log(10))*100,100):100;
  const fc=phase>=2?"#a78bfa":mult>5?"#22c55e":mult>2?"#f59e0b":"#22c55e33";
  const dots=[{l:"1x",p:0},{l:"2x",p:Math.log(2)/Math.log(10)*100},
              {l:"5x",p:Math.log(5)/Math.log(10)*100},{l:"10x",p:100}];
  return `<div class="road">
    <div class="road-line"><div class="road-prog" style="width:${lp}%;background:${fc}"></div></div>
    ${dots.map(d=>`
      <div class="rdot" style="left:calc(${d.p}% - ${d.p===0?0:d.p===100?18:10}px)">
        <div class="rcirc" style="background:${lp>=d.p?"#22c55e":"#111"};border:2px solid ${lp>=d.p?"#22c55e":"#1e1e1e"};${lp>=d.p?"box-shadow:0 0 8px #22c55e55":""}">
          ${lp>=d.p?"✓":""}
        </div>
        <span style="font-size:8px;font-weight:800;color:${lp>=d.p?"#22c55e":d.l==="10x"?"#333":"#1a1a1a"}">${d.l}</span>
      </div>`).join("")}
  </div>`;
}

function tradeCard(tr){
  const pnl=tr.pnl||0,mult=tr.mult||1,phase=tr.phase;
  const hp=phase===1?1.0:MOON_30;
  const cv=tr.invested*hp*Math.max(mult,0.01);
  const uid=`cca_${tr.id}`;
  return `<div class="card fu" style="border-color:${phase===2?"#a78bfa33":pnl>20?"#22c55e22":pnl<-15?"#f8717122":"#1a1a1a"}">
    <div class="row" style="margin-bottom:6px">
      <div>
        <span style="font-size:20px;font-weight:800;color:#fff;letter-spacing:-.5px">${tr.sym}</span>
        ${tr.paper?`<span style="font-size:8px;color:#f59e0b;margin-left:6px;font-weight:700">PAPER</span>`:""}
        <div style="font-size:8px;color:#1a1a1a;margin-top:1px">${ag(tr.entryTime)} ago</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
        ${chip(tr.sig,tr.sig==="STRONG"?"#22c55e":"#f59e0b")}
        ${chip(phase===1?"RIDING TO 10x ▶":"🌙 MOONBAG 30%",phase===1?"#f59e0b":"#a78bfa")}
      </div>
    </div>
    ${ccaHTML(tr.mint,uid)}
    <div style="margin-top:12px">${road10x(mult,phase)}</div>
    <div style="text-align:center;margin:6px 0 12px">
      <div style="font-size:38px;font-weight:800;color:${pC(pnl)};letter-spacing:-2px;line-height:1">${mult.toFixed(2)}x</div>
      <div style="font-size:11px;color:${pC(pnl)};margin-top:2px">${fP(pnl)}</div>
    </div>
    <div class="inset">
      <div style="font-size:8px;color:#1a1a1a;font-weight:800;letter-spacing:.5px;margin-bottom:7px">POSITION</div>
      <div style="display:flex;flex-direction:column;gap:4px">
        <div class="row"><span style="font-size:10px;color:#333">Invested</span><span style="font-size:10px;color:#555">${fU(tr.invested)}</span></div>
        ${phase>=2?`<div class="row"><span style="font-size:10px;color:#22c55e">✓ Sold 70% @ 10x</span><span style="font-size:10px;color:#22c55e;font-weight:800">+${fU(tr.ret10x||0)}</span></div>`:""}
        <div class="row"><span style="font-size:10px;color:#444">Holding (${(hp*100).toFixed(0)}%${phase>=2?" free":""})</span><span style="font-size:10px;color:${pC(pnl)};font-weight:700">${fU(cv)}</span></div>
        <div class="row"><span style="font-size:10px;color:#333">Entry</span><span style="font-size:10px;color:#555">$${tr.entryPrice?.toFixed(8)}</span></div>
        <div class="row"><span style="font-size:10px;color:#444">Now</span><span style="font-size:10px;color:${pC(pnl)};font-weight:700">$${tr.curPrice?.toFixed(8)}</span></div>
      </div>
    </div>
    ${phase===1?`<div style="margin-bottom:10px">
      <div class="row" style="margin-bottom:3px">
        <span style="font-size:8px;color:#1a1a1a">STOP-LOSS -40%</span>
        <span style="font-size:9px;color:${pnl<=-25?"#f87171":"#333"}">${fP(pnl)}</span>
      </div>
      <div class="bar"><div class="barf" style="width:${Math.min(Math.max((pnl+40)/140*100,0),100)}%;background:${pnl<-25?"#f87171":pnl<-10?"#f59e0b":"#22c55e33"}"></div></div>
    </div>`:""}
    <div style="font-size:8px;color:#2a2a2a;margin-bottom:6px;letter-spacing:.5px;font-weight:800">MANUAL EXIT</div>
    <div class="sgrid">
      ${[{l:"25%",p:.25,c:"#f59e0b"},{l:"50%",p:.5,c:"#fb923c"},{l:"80%",p:.8,c:"#f87171"},{l:"100%",p:1,c:"#ef4444"}].map(b=>
        `<button class="sbtn" onclick="manualSell(${tr.id},${b.p})" style="background:${b.c}14;color:${b.c};border:1px solid ${b.c}44">SELL ${b.l}</button>`
      ).join("")}
    </div>
  </div>`;
}

      </div>
    </div>

    <button class="launch-btn" onclick="launch()">Launch Dashboard →</button>

    <div style="margin-top:16px;text-align:center;font-size:9px;color:#1a1a1a;line-height:1.9">
      L1: Liquidity · Mint/Freeze · Blacklist<br>
      L2: Concentration · Bot score · Vol/Liq · Fee<br>
      L3: Narrative · Momentum · Signal strength
    </div>
  </div>`;
}

// ── NAV ──
function setT(t){S.tab=t;render();window.scrollTo(0,0);}
function goSetup(){S.screen="setup";render();}
function launch(){
  if(!S.heliusKey.trim()){toast("⚠ Enter your Helius API key","#f59e0b");return;}
  persist();S.screen="dashboard";S.portfolioVal=S.balance;render();
}

// ── BOOT ──
hydrate();
if(S.heliusKey)S.screen="dashboard";
render();
</script>
