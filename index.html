var TRADE_AMT = 5;
var SL_PCT    = 0.40;
var SOL_MINT  = “So11111111111111111111111111111111111111112”;
var EXITS = [
{ph:1, target:2.0, sell:0.80, label:“2x”},
{ph:2, target:5.0, sell:0.50, label:“5x”},
{ph:3, target:10.0,sell:0.50, label:“10x”},
];

// ── Realistic fake Solana CA generator ──────────────
var BASE58 = “123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz”;
function makeCA(){
var ca=””;for(var i=0;i<44;i++)ca+=BASE58[Math.floor(Math.random()*BASE58.length)];
return ca;
}

// ── STATE ─────────────────────────────────────────────
var S = {
screen:“setup”, tab:“positions”,
hKey:””, wPub:””, paper:true,
running:false, mode:“NORMAL”,
balance:10, portVal:10, totalPnl:0, solPrice:150,
trades:[], closed:[], log:[],
wins:0, losses:0, blacklist:[],
scanning:false, scanSym:””, scanCA:””,
scanTimer:null, tickTimer:null,
apiStatus:””, // shows API connection status
};

function save(){ try{localStorage.setItem(“rx_hk”,S.hKey);localStorage.setItem(“rx_pk”,S.wPub);localStorage.setItem(“rx_pm”,S.paper?“1”:“0”);}catch(e){} }
function load(){ try{S.hKey=localStorage.getItem(“rx_hk”)||””;S.wPub=localStorage.getItem(“rx_pk”)||””;S.paper=localStorage.getItem(“rx_pm”)!==“0”;}catch(e){} }

function G(id){ return document.getElementById(id); }
function fU(n){ return “$”+Math.abs(parseFloat(n)||0).toFixed(2); }
function fP(n){ return (n>=0?”+”:””)+parseFloat(n).toFixed(1)+”%”; }
function pC(n){ return n>0?”#22c55e”:n<0?”#f87171”:”#888”; }
function sh(a){ return a?a.slice(0,5)+”…”+a.slice(-4):”—”; }
function ag(ts){ var s=Math.floor((Date.now()-ts)/1000); return s<60?s+“s”:Math.floor(s/60)+“m ago”; }
function rand(a,b){ return Math.random()*(b-a)+a; }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
var MC={NORMAL:”#22c55e”,STRICT:”#f87171”,RECOVERY:”#f59e0b”};

var _tt;
function toast(msg,col){
col=col||”#22c55e”;
var t=G(“TOAST”);
if(!t){t=document.createElement(“div”);t.id=“TOAST”;t.style.cssText=“position:fixed;top:58px;left:50%;transform:translateX(-50%) translateY(-20px);background:#111;border-radius:10px;padding:10px 16px;font-size:11px;font-weight:bold;z-index:9999;pointer-events:none;max-width:90vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:all 0.3s;opacity:0;border:1px solid #333”;document.body.appendChild(t);}
t.textContent=msg;t.style.color=col;t.style.borderColor=col+“55”;
t.style.opacity=“1”;t.style.transform=“translateX(-50%) translateY(0)”;
clearTimeout(_tt);_tt=setTimeout(function(){t.style.opacity=“0”;t.style.transform=“translateX(-50%) translateY(-20px)”;},3600);
}

function addLog(e){
if(!e.id)e.id=Date.now()+Math.random();
if(!e.time)e.time=Date.now();
S.log.unshift(e);
if(S.log.length>200)S.log.pop();
}

// ── TOKEN GENERATORS ─────────────────────────────────
// Always-available simulated tokens (paper mode fallback)
var SYMS=[“BONK”,“PEPE”,“WIF”,“MEW”,“GOAT”,“POPCAT”,“MOODENG”,“GIGACHAD”,“DEGEN”,“CHAD”,“BULL”,“FROG”,“APE”,“ZEN”,“SEND”,“GG”,“HONK”,“CHILL”,“KEKS”,“REKT”,“COPE”,“WAGMI”,“MOON”,“PUMP”,“LAIKA”,“BOME”,“MYRO”,“SILLY”,“NOOT”,“PONKE”];
var METAS=[“AI Agent”,“Animal Meme”,“Political”,“Celebrity”,“DeFi Culture”,“Gaming”];

function makeToken(forcePass){
// 30% pass rate naturally; forcePass=true makes it definitely pass
var pass = forcePass || Math.random()<0.28;
var name = pick(SYMS)+(Math.random()>0.65?Math.floor(rand(2,99)):””);
return {
mint:     makeCA(),
sym:      name.slice(0,6).toUpperCase(),
name:     name,
meta:     pick(METAS),
price:    rand(0.000001, 0.01),
liq:      pass ? rand(7000,120000) : rand(100,4800),
vol24:    pass ? rand(20000,500000): rand(500,4000),
vol1:     pass ? rand(5000,50000)  : rand(100,1000),
ch1:      pass ? rand(15,200)      : rand(-40,15),
top10:    pass ? rand(3,32)        : rand(40,75),
age:      rand(5,480),
buys:     Math.floor(rand(40,600)),
sells:    Math.floor(rand(20,250)),
mintAuth: !pass&&Math.random()<0.3,
freezeAuth: false,
simulated: true,
_pd: Math.random()>0.42?1:-1,
_vol: rand(0.06,0.18),
};
}

// ── REAL API CALLS ────────────────────────────────────
function fetchJSON(url, opts){
return fetch(url, opts||{})
.then(function(r){
if(!r.ok) throw new Error(“HTTP “+r.status);
return r.json();
});
}

function getSolPrice(){
return fetchJSON(“https://price.jup.ag/v4/price?ids=SOL”)
.then(function(d){
S.solPrice=(d.data&&d.data.SOL)?d.data.SOL.price:150;
return S.solPrice;
}).catch(function(){return 150;});
}

function getWalletBal(){
if(!S.hKey||!S.wPub)return Promise.resolve();
var rpc=“https://mainnet.helius-rpc.com/?api-key=”+S.hKey;
return fetchJSON(rpc,{
method:“POST”,headers:{“Content-Type”:“application/json”},
body:JSON.stringify({jsonrpc:“2.0”,id:1,method:“getBalance”,params:[S.wPub]})
}).then(function(d){
if(d.result&&d.result.value!==undefined){
var sol=d.result.value/1e9;
S.balance=parseFloat((sol*S.solPrice).toFixed(2));
S.portVal=S.balance;
addLog({sym:“💼”,name:“Wallet”,mint:””,result:“INFO”,reason:“Balance: “+fU(S.balance)+” (”+sol.toFixed(4)+” SOL)”});
render();
}
}).catch(function(e){
addLog({sym:“⚠”,name:“Wallet”,mint:””,result:“WARN”,reason:“Balance fetch failed: “+e.message});
});
}

function getHeliusOnChain(mint){
if(!S.hKey)return Promise.resolve(null);
var rpc=“https://mainnet.helius-rpc.com/?api-key=”+S.hKey;
return Promise.all([
fetchJSON(rpc,{method:“POST”,headers:{“Content-Type”:“application/json”},
body:JSON.stringify({jsonrpc:“2.0”,id:1,method:“getAccountInfo”,params:[mint,{encoding:“jsonParsed”}]})})
.catch(function(){return{};}),
fetchJSON(rpc,{method:“POST”,headers:{“Content-Type”:“application/json”},
body:JSON.stringify({jsonrpc:“2.0”,id:2,method:“getTokenLargestAccounts”,params:[mint]})})
.catch(function(){return{};})
]).then(function(res){
var info=res[0]&&res[0].result&&res[0].result.value&&res[0].result.value.data&&res[0].result.value.data.parsed&&res[0].result.value.data.parsed.info;
var holders=(res[1]&&res[1].result&&res[1].result.value)||[];
var top10=0;
if(holders.length){
var tot=holders.reduce(function(s,a){return s+parseFloat(a.uiAmount||0);},0);
var t10=holders.slice(0,10).reduce(function(s,a){return s+parseFloat(a.uiAmount||0);},0);
top10=tot>0?(t10/tot)*100:0;
}
return {mintAuth:!!(info&&info.mintAuthority),freezeAuth:!!(info&&info.freezeAuthority),top10:top10};
}).catch(function(){return null;});
}

// ── STRATEGY ──────────────────────────────────────────
function runStrategy(t){
var mode=S.mode;
var checks=[];var pass=true;var reason=null;
function fail(l,r){checks.push({l:l,s:“REJECT”,r:r});if(pass){pass=false;reason=l+”: “+r;}}
function ok(l,r){checks.push({l:l,s:“PASS”,r:r});}
function skip(l,r){checks.push({l:l,s:“SKIP”,r:r});}

var lf=mode===“STRICT”?10000:5000;
if(!t.liq||t.liq<lf) fail(“Liquidity”,fU(t.liq||0)+” < “+fU(lf));
else ok(“Liquidity”,fU(t.liq));
if(t.mintAuth) fail(“Mint Auth”,“Active”);
else if(t.freezeAuth) fail(“Freeze”,“Active”);
else ok(“Perms”,“Clean”);
if(S.blacklist.indexOf(t.mint)>=0)fail(“Blacklist”,“Flagged”);
else ok(“Blacklist”,“Clear”);
if(!pass)return{pass:false,reason:reason,checks:checks,sig:null};

var cl=mode===“STRICT”?15:40;
if((t.top10||0)>cl) fail(“Top10”,(t.top10||0).toFixed(0)+”%>”+cl+”%”);
else ok(“Top10”,(t.top10||0).toFixed(0)+”%”);
var txns=(t.buys||0)+(t.sells||0);
var bs=txns>0&&(t.buys/txns)>0.88?72:32;
if(bs>55)fail(“BotScore”,””+bs);
else ok(“BotScore”,bs+” ok”);
var vlr=t.liq>0?t.vol24/t.liq:0;
if(vlr>20)fail(“Vol/Liq”,vlr.toFixed(1)+“x”);
else ok(“Vol/Liq”,vlr.toFixed(1)+“x”);
if(t.age&&t.age>=120)ok(“Fee”,“~0.25%”);
else skip(“Fee”,”<2h”);
if(!pass)return{pass:false,reason:reason,checks:checks,sig:null};

var mom=Math.min(((t.ch1||0)+50),100);
var vs=Math.min(((t.vol24||0)/10000)*40,100);
var ns=mom*0.5+vs*0.5;
var sig=ns>=65?“STRONG”:ns>=40?“WEAK”:“NO_SIGNAL”;
ok(“Narrative”,ns.toFixed(0)+“→”+sig);
if(sig===“NO_SIGNAL”)return{pass:false,reason:“Narrative “+ns.toFixed(0)+”<40”,checks:checks,sig:sig};
return{pass:true,reason:null,checks:checks,sig:sig};
}

// ── TRADE MANAGEMENT ──────────────────────────────────
function checkExits(tr){
var inList=false;for(var i=0;i<S.trades.length;i++){if(S.trades[i].id===tr.id){inList=true;break;}}
if(!inList)return;

if(tr.phase===1&&tr.pnl<=-(SL_PCT*100)){
var ret=tr.invested*(1-SL_PCT);
S.balance+=ret;S.totalPnl-=tr.invested*SL_PCT;
closeTrade(tr,“Stop-loss -40%”,ret);
toast(“💀 “+tr.sym+” -40% · “+fU(ret)+” back”,”#f87171”);
addLoss();
if(!S.paper)window.open(“https://jup.ag/swap/”+tr.mint+”-SOL”,”_blank”);
return;
}

for(var i=0;i<EXITS.length;i++){
var rule=EXITS[i];
if(tr.phase===rule.ph&&tr.mult>=rule.target){
var sv=tr.invested*tr.holdPct*rule.sell*tr.mult;
tr.returns.push({label:rule.label,usd:sv});
tr.holdPct*=(1-rule.sell);tr.phase++;
S.balance+=sv;S.totalPnl+=sv;addWin();
toast((rule.label===“2x”?“🎯”:rule.label===“5x”?“🚀”:“💎”)+” “+tr.sym+” “+rule.label+”! +”+fU(sv),”#22c55e”);
addLog({sym:tr.sym,name:tr.sym,mint:tr.mint,result:“SELL”,
reason:rule.label+” → sold “+Math.round(rule.sell*100)+”% · +”+fU(sv)+
(rule.label===“2x”?” · scanning next…”:””),checks:[]});
if(!S.paper)window.open(“https://jup.ag/swap/”+tr.mint+”-SOL”,”_blank”);
// After 2x — capital recovered — scan immediately for next trade
if(rule.label===“2x”&&S.running){
setTimeout(function(){
if(S.paper)scanOneToken();
else liveOneScan();
},1500);
}
return;
}
}

if(tr.phase===4){
var hm=(Date.now()-tr.entryTime)/60000;
if(tr.pnl<-25||(hm>40&&Math.random()<0.12)){
var mv=tr.invested*tr.holdPct*Math.max(tr.mult,0.01);
S.balance+=mv;S.totalPnl+=mv;
closeTrade(tr,“🌙 Moonbag closed”,mv);
toast(“🌙 “+tr.sym+” moonbag → “+fU(mv),”#a78bfa”);
if(mv>0)addWin();else addLoss();
if(!S.paper)window.open(“https://jup.ag/swap/”+tr.mint+”-SOL”,”_blank”);
}
}
}

function closeTrade(tr,reason,exitUsd){
S.trades=S.trades.filter(function(t){return t.id!==tr.id;});
var c={};for(var k in tr)c[k]=tr[k];
c.exitReason=reason;c.exitUsd=exitUsd;c.closedAt=Date.now();
S.closed.unshift(c);if(S.closed.length>60)S.closed.pop();
}
function addWin(){S.wins++;S.losses=0;if(S.wins>=1&&S.mode===“STRICT”)S.mode=“RECOVERY”;if(S.wins>=2&&S.mode===“RECOVERY”)S.mode=“NORMAL”;}
function addLoss(){S.losses++;S.wins=0;if(S.losses>=3)S.mode=“STRICT”;}

function manualSell(id,pct){
var tr=null;for(var i=0;i<S.trades.length;i++){if(S.trades[i].id===id){tr=S.trades[i];break;}}
if(!tr)return;
var cv=tr.invested*tr.holdPct*Math.max(tr.mult,0.01);var sv=cv*pct;
S.balance+=sv;
toast(“✋ “+tr.sym+” sold “+Math.round(pct*100)+”% → +”+fU(sv),”#f59e0b”);
addLog({sym:tr.sym,name:tr.sym,mint:tr.mint,result:“SELL”,reason:“Manual “+Math.round(pct*100)+”% · +”+fU(sv),checks:[]});
if(!S.paper)window.open(“https://jup.ag/swap/”+tr.mint+”-SOL”,”_blank”);
if(pct>=1){closeTrade(tr,“Manual “+Math.round(pct*100)+”%”,sv);if(tr.pnl>0)addWin();else addLoss();}
else tr.holdPct*=(1-pct);
render();
}

// ── PAPER SCAN — processes one token at a time ─────────
// This is the core loop — always works, never hangs
var _paperQueue=[];

_fetchingPaper=true;

getPumpTokens().catch(function(){return[];})

}).catch(function(){
var sim=[];for(var i=0;i<20;i++)sim.push(makeToken());
_paperQueue=sim;
S.apiStatus=“⚠ Using simulated tokens”;
}).then(function(){_fetchingPaper=false;});
}

return false;
}

S.scanning=true;S.scanSym=token.sym;S.scanCA=token.mint;
render();

// Simulate analysis time
setTimeout(function(){
if(!S.running){S.scanning=false;render();return;}

function paperPriceTick(){
if(!S.paper||!S.running||!S.trades.length)return;
var changed=false;
for(var i=0;i<S.trades.length;i++){
var tr=S.trades[i];
if(!tr.paper)continue;
var chg=rand(-tr._vol,tr._vol*1.5)*tr._pd;
tr.curPrice=Math.max(tr.curPrice*(1+chg),tr.entryPrice*0.005);
tr.pnl=((tr.curPrice-tr.entryPrice)/tr.entryPrice)*100;
tr.mult=1+tr.pnl/100;
checkExits(tr);changed=true;
}
if(changed){
S.portVal=S.balance+S.trades.reduce(function(s,t){return s+t.invested*t.holdPct*Math.max(t.mult,0.01);},0);
render();
}
}

// ── LIVE SCAN ──────────────────────────────────────────
function liveOneScan(){
if(!S.running||S.paper||S.scanning)return;
if(hasPhase1Trade())return;
if(S.balance<TRADE_AMT){toast(“⚠ Need “+fU(TRADE_AMT)+” balance”,”#f59e0b”);return;}

S.scanning=true;render();

Promise.all([
getGeckoTokens().catch(function(){return[];}),
getPumpTokens().catch(function(){return[];})
]).then(function(res){
var all=res[0].concat(res[1]);
// deduplicate
var seen={};var tokens=[];
all.forEach(function(t){if(t.mint&&!seen[t.mint]){seen[t.mint]=true;tokens.push(t);}});
