<script>
try {

// ══════════════════════════════════════════════════
//  HELPERS — no $ shorthand to avoid conflicts
// ══════════════════════════════════════════════════
function getEl(id){ return document.getElementById(id); }
function fU(n){ return "$"+Math.abs(parseFloat(n)||0).toFixed(2); }
function fP(n){ return (n>=0?"+":"")+parseFloat(n).toFixed(1)+"%"; }
function pC(n){ return n>0?"#22c55e":n<0?"#f87171":"#888"; }
function sh(a){ return a?a.slice(0,5)+"…"+a.slice(-4):""; }
function ag(ts){ var s=Math.floor((Date.now()-ts)/1000); return s<60?s+"s":Math.floor(s/60)+"m"; }
function rand(a,b){ return Math.random()*(b-a)+a; }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

var modeCol = {NORMAL:"#22c55e",STRICT:"#f87171",RECOVERY:"#f59e0b"};

function showToast(msg,col){
  col = col||"#22c55e";
  var el = getEl("TOAST");
  if(!el){
    el = document.createElement("div");
    el.id = "TOAST";
    el.style.cssText = "position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-20px);background:#111;border-radius:10px;padding:10px 16px;font-size:11px;font-weight:bold;z-index:9999;pointer-events:none;max-width:90vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:all 0.3s;opacity:0;border:1px solid #333;";
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.color = col;
  el.style.borderColor = col+"55";
  el.style.opacity = "1";
  el.style.transform = "translateX(-50%) translateY(0)";
  clearTimeout(el._t);
  el._t = setTimeout(function(){ el.style.opacity="0"; el.style.transform="translateX(-50%) translateY(-20px)"; }, 3500);
}

function persist(){
  try{
    localStorage.setItem("rx_hk", S.hKey);
    localStorage.setItem("rx_pk", S.wPub);
    localStorage.setItem("rx_pm", S.paper?"1":"0");
  }catch(e){}
}
function hydrate(){
  try{
    S.hKey = localStorage.getItem("rx_hk")||"";
    S.wPub = localStorage.getItem("rx_pk")||"";
    S.paper = localStorage.getItem("rx_pm")!=="0";
  }catch(e){}
}

// ══════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════
var TRADE_AMT = 5;   // renamed from TRADE$ to avoid $ conflict
var SL_PCT    = 0.40;
var SOL_MINT  = "So11111111111111111111111111111111111111112";
var EXITS = [
  {ph:1, target:2.0,  sell:0.80, label:"2x"},
  {ph:2, target:5.0,  sell:0.50, label:"5x"},
  {ph:3, target:10.0, sell:0.50, label:"10x"},
];

var S = {
  screen:"setup", tab:"positions",
  hKey:"", wPub:"", paper:true,
  running:false, mode:"NORMAL",
  balance:10, portVal:10, totalPnl:0, solPrice:150,
  trades:[], closed:[], log:[],
  wins:0, losses:0, blacklist:[],
  scanning:false, currentSym:"",
  scanTimer:null, tickTimer:null, balTimer:null, paperTimer:null,
};

// ══════════════════════════════════════════════════
//  FAKE TOKENS — paper mode simulation
// ══════════════════════════════════════════════════
var FAKE_NAMES = ["BONK","PEPE","WIF","MEW","GOAT","POPCAT","MOODENG","GIGACHAD","DEGEN","CHAD","BULL","COPE","WAGMI","MOON","PUMP","FROG","CATDOG","AIPEPE","SOLCAT","KEKS","REKT","BASED","SEND","GG","HONK","CHILL","APE","ZEN","VIBES","GIGA"];
var FAKE_META  = ["AI Agent","Animal Meme","Political","Celebrity","Solana-Native","DeFi Culture"];
var fakeId = 0;

function makeFakeToken(){
  fakeId++;
  var name = pick(FAKE_NAMES)+(Math.random()>0.6?Math.floor(rand(2,99)):"");
  var willPass = Math.random()<0.30;
  var liq      = willPass ? rand(6000,80000) : rand(500,4900);
  var vol24    = liq * rand(2,15);
  var ch1      = willPass ? rand(5,120) : rand(-30,30);
  var top10    = willPass ? rand(5,35)  : rand(35,70);
  var buys     = Math.floor(rand(50,500));
  var sells    = Math.floor(rand(20,200));
  var age      = rand(10,300);
  var price    = rand(0.0000001, 0.005);
  return {
    mint: "FAKE"+fakeId+"So1"+Math.random().toString(36).slice(2,10),
    name:name, sym:name.slice(0,6).toUpperCase(),
    meta:pick(FAKE_META),
    price:price, liq:liq, vol24:vol24, vol1:vol24/24,
    ch1:ch1, top10:top10, age:age,
    buys:buys, sells:sells,
    mintAuth:(!willPass&&Math.random()<0.3),
    freezeAuth:false, fake:true,
    priceDir:(Math.random()>0.4?1:-1),
    volatility:rand(0.08,0.22),
  };
}

// ══════════════════════════════════════════════════
//  STRATEGY ENGINE
// ══════════════════════════════════════════════════
function runStrategy(token){
  var mode = S.mode;
  var checks = []; var pass=true; var reason=null;
  function fail(l,r){ checks.push({l:l,s:"REJECT",r:r}); if(pass){pass=false;reason=l+": "+r;} }
  function ok(l,r)  { checks.push({l:l,s:"PASS",  r:r}); }
  function skip(l,r){ checks.push({l:l,s:"SKIP",  r:r}); }

  // Layer 1 — Safety
  var lf = mode==="STRICT" ? 10000 : 5000;
  if(token.liq < lf)  fail("Liquidity","$"+(token.liq||0).toFixed(0)+" < $"+lf);
  else                 ok("Liquidity", "$"+(token.liq||0).toFixed(0));
  if(token.mintAuth)   fail("Mint Auth","Active — inf supply");
  else if(token.freezeAuth) fail("Freeze","Active");
  else                 ok("Perms","Clean");
  if(S.blacklist.indexOf(token.mint)>=0) fail("Blacklist","Flagged");
  else                 ok("Blacklist","Clear");
  if(!pass) return {pass:false,reason:reason,checks:checks,sig:null};

  // Layer 2 — Quality
  var cl = mode==="STRICT" ? 15 : 40;
  if(token.top10 > cl) fail("Concentration",(token.top10||0).toFixed(0)+"%>"+cl+"%");
  else                 ok("Concentration", (token.top10||0).toFixed(0)+"%");
  var txns = (token.buys||0)+(token.sells||0);
  var bs   = (txns>0 && (token.buys/txns)>0.88) ? 72 : 32;
  if(bs > 55) fail("Bot Score",bs+" snipe");
  else        ok("Bot Score", bs+" clean");
  var vlr = token.liq>0 ? token.vol24/token.liq : 0;
  if(vlr > 20) fail("Vol/Liq",vlr.toFixed(1)+"x inflated");
  else         ok("Vol/Liq", vlr.toFixed(1)+"x");
  if(token.age && token.age>=120) ok("Fee","~0.25%");
  else skip("Fee","<2h old");
  if(!pass) return {pass:false,reason:reason,checks:checks,sig:null};

  // Layer 3 — Narrative
  var mom = Math.min((token.ch1+50), 100);
  var vs  = Math.min((token.vol24/10000)*40, 100);
  var ns  = mom*0.5 + vs*0.5;
  var sig = ns>=65?"STRONG" : ns>=40?"WEAK" : "NO_SIGNAL";
  ok("Narrative", ns.toFixed(0)+"→"+sig);
  if(sig==="NO_SIGNAL") return {pass:false,reason:"Narrative "+ns.toFixed(0)+"<40",checks:checks,sig:sig};
  return {pass:true,reason:null,checks:checks,sig:sig};
}

// ══════════════════════════════════════════════════
//  TRADE MANAGEMENT
// ══════════════════════════════════════════════════
function checkExits(tr){
  if(!tr) return;
  // Stop loss — phase 1 only
  if(tr.phase===1 && tr.pnl <= -(SL_PCT*100)){
    var ret = tr.invested*(1-SL_PCT);
    S.balance   += ret;
    S.totalPnl  -= tr.invested*SL_PCT;
    closeTrade(tr, "Stop-loss -40%", ret);
    showToast("💀 "+tr.sym+" -40% · "+fU(ret)+" back","#f87171");
    addLoss();
    if(!S.paper) window.open("https://jup.ag/swap/"+tr.mint+"-SOL","_blank");
    return;
  }
  // Phase exits 2x / 5x / 10x
  for(var i=0; i<EXITS.length; i++){
    var rule = EXITS[i];
    if(tr.phase===rule.ph && tr.mult>=rule.target){
      var sv = tr.invested * tr.holdPct * rule.sell * tr.mult;
      tr.returns.push({label:rule.label, usd:sv});
      tr.holdPct *= (1 - rule.sell);
      tr.phase++;
      S.balance  += sv;
      S.totalPnl += sv;
      addWin();
      var em = rule.label==="2x"?"🎯":rule.label==="5x"?"🚀":"💎";
      showToast(em+" "+tr.sym+" "+rule.label+"! +"+fU(sv),"#22c55e");
      if(!S.paper) window.open("https://jup.ag/swap/"+tr.mint+"-SOL","_blank");
      return;
    }
  }
  // Moonbag exit (phase 4)
  if(tr.phase===4){
    var hm  = (Date.now()-tr.entryTime)/60000;
    var sig = (tr.pnl < -20 ? 1:0) + (hm>30 && Math.random()<0.12 ? 1:0);
    if(sig>=2){
      var mv = tr.invested * tr.holdPct * Math.max(tr.mult,0.01);
      S.balance  += mv;
      S.totalPnl += mv;
      closeTrade(tr,"🌙 Moonbag closed",mv);
      showToast("🌙 "+tr.sym+" moonbag → "+fU(mv),"#a78bfa");
      if(tr.pnl>0) addWin(); else addLoss();
      if(!S.paper) window.open("https://jup.ag/swap/"+tr.mint+"-SOL","_blank");
    }
  }
}

function closeTrade(tr, reason, exitUsd){
  S.trades = S.trades.filter(function(t){ return t.id!==tr.id; });
  var copy = {};
  for(var k in tr) copy[k]=tr[k];
  copy.exitReason = reason;
  copy.exitUsd    = exitUsd;
  copy.closedAt   = Date.now();
  S.closed.unshift(copy);
  if(S.closed.length>60) S.closed.pop();
}

function addWin(){
  S.wins++; S.losses=0;
  if(S.wins>=1 && S.mode==="STRICT")   S.mode="RECOVERY";
  if(S.wins>=2 && S.mode==="RECOVERY") S.mode="NORMAL";
}
function addLoss(){
  S.losses++; S.wins=0;
  if(S.losses>=3) S.mode="STRICT";
}

function manualSell(id, pct){
  var tr = null;
  for(var i=0; i<S.trades.length; i++){ if(S.trades[i].id===id){ tr=S.trades[i]; break; } }
  if(!tr) return;
  var cv = tr.invested * tr.holdPct * Math.max(tr.mult,0.01);
  var sv = cv * pct;
  S.balance += sv;
  showToast("✋ "+tr.sym+" sold "+Math.round(pct*100)+"% → +"+fU(sv),"#f59e0b");
  if(!S.paper) window.open("https://jup.ag/swap/"+tr.mint+"-SOL","_blank");
  if(pct>=1){
    closeTrade(tr,"Manual "+Math.round(pct*100)+"%",sv);
    if(tr.pnl>0) addWin(); else addLoss();
  } else {
    tr.holdPct *= (1-pct);
  }
  render();
}

// ══════════════════════════════════════════════════
//  PAPER MODE SCAN — runs every 5s, always visible
// ══════════════════════════════════════════════════
function paperScanTick(){
  if(!S.running || !S.paper) return;
  var token = makeFakeToken();
  S.currentSym = token.sym;
  S.scanning   = true;
  render();

  setTimeout(function(){
    var res = runStrategy(token);
    S.log.unshift({
      id: Date.now()+Math.random(),
      time: Date.now(),
      mint:token.mint, sym:token.sym, name:token.name,
      result: res.pass ? "BUY" : "SKIP",
      reason: res.pass ? res.sig+" signal" : (res.reason||"").slice(0,42),
      checks: res.checks,
      liq:token.liq, vol24:token.vol24, price:token.price,
      expanded:false, fake:true,
    });
    if(S.log.length>100) S.log.pop();

    // Buy if pass + no active phase-1 trade + enough balance
    var activeP1 = 0;
    for(var i=0;i<S.trades.length;i++){ if(S.trades[i].phase<=3) activeP1++; }
    if(res.pass && activeP1===0 && S.balance>=TRADE_AMT){
      S.balance -= TRADE_AMT;
      S.trades.push({
        id:Date.now(), mint:token.mint, name:token.name, sym:token.sym,
        sig:res.sig, checks:res.checks, meta:token.meta,
        entryPrice:token.price, curPrice:token.price,
        entryLiq:token.liq, invested:TRADE_AMT,
        pnl:0, mult:1, phase:1, holdPct:1.0, returns:[],
        peakVol:token.vol1||0, entryTime:Date.now(), paper:true,
        priceDir:token.priceDir, volatility:token.volatility,
      });
      showToast("◈ PAPER BOUGHT "+token.sym+" · "+res.sig+" · "+fU(TRADE_AMT),"#22c55e");
    }

    S.scanning   = false;
    S.currentSym = "";
    render();
  }, 600);
}

function paperPriceTick(){
  if(!S.paper || !S.running) return;
  for(var i=0; i<S.trades.length; i++){
    var tr = S.trades[i];
    if(!tr.paper) continue;
    var chg = rand(-tr.volatility, tr.volatility*1.5) * tr.priceDir;
    tr.curPrice = Math.max(tr.curPrice*(1+chg), tr.entryPrice*0.01);
    tr.pnl  = ((tr.curPrice-tr.entryPrice)/tr.entryPrice)*100;
    tr.mult = 1 + tr.pnl/100;
    checkExits(tr);
  }
  S.portVal = S.balance + S.trades.reduce(function(s,t){
    return s + t.invested*t.holdPct*Math.max(t.mult,0.01);
  },0);
  render();
}

// ══════════════════════════════════════════════════
//  REAL API CALLS
// ══════════════════════════════════════════════════
function getSolPrice(){
  return fetch("https://price.jup.ag/v4/price?ids=SOL")
    .then(function(r){ return r.json(); })
    .then(function(d){ S.solPrice = (d.data&&d.data.SOL)?d.data.SOL.price:150; return S.solPrice; })
    .catch(function(){ return S.solPrice; });
}

function fetchWalletBalance(){
  if(!S.hKey||!S.wPub) return Promise.resolve();
  var rpc = "https://mainnet.helius-rpc.com/?api-key="+S.hKey;
  return fetch(rpc,{
    method:"POST", headers:{"Content-Type":"application/json"},
    body:JSON.stringify({jsonrpc:"2.0",id:1,method:"getBalance",params:[S.wPub]})
  }).then(function(r){ return r.json(); })
    .then(function(d){
      if(d.result && d.result.value!==undefined){
        var sol = d.result.value/1e9;
        return getSolPrice().then(function(sp){
          S.balance  = parseFloat((sol*sp).toFixed(2));
          S.portVal  = S.balance;
          render();
        });
      }
    }).catch(function(e){ console.log("Bal:",e); });
}

function getHeliusTokenData(mint){
  if(!S.hKey) return Promise.resolve(null);
  var rpc = "https://mainnet.helius-rpc.com/?api-key="+S.hKey;
  return Promise.all([
    fetch(rpc,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({jsonrpc:"2.0",id:1,method:"getAccountInfo",params:[mint,{encoding:"jsonParsed"}]})})
      .then(function(r){return r.json();}),
    fetch(rpc,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({jsonrpc:"2.0",id:2,method:"getTokenLargestAccounts",params:[mint]})})
      .then(function(r){return r.json();}),
    fetch(rpc,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({jsonrpc:"2.0",id:3,method:"getAsset",params:{id:mint}})})
      .then(function(r){return r.json();}),
  ]).then(function(res){
    var acctData = res[0].result&&res[0].result.value&&res[0].result.value.data&&res[0].result.value.data.parsed&&res[0].result.value.data.parsed.info;
    var holdData = res[1].result&&res[1].result.value||[];
    var assetData= res[2].result;
    var top10=0;
    if(holdData.length){
      var tot=holdData.reduce(function(s,a){return s+parseFloat(a.uiAmount||0);},0);
      var t10=holdData.slice(0,10).reduce(function(s,a){return s+parseFloat(a.uiAmount||0);},0);
      top10 = tot>0?(t10/tot)*100:0;
    }
    return {
      name: (assetData&&assetData.content&&assetData.content.metadata&&assetData.content.metadata.name)||"Unknown",
      sym:  (assetData&&assetData.content&&assetData.content.metadata&&assetData.content.metadata.symbol)||"???",
      mintAuth:   !!(acctData&&acctData.mintAuthority),
      freezeAuth: !!(acctData&&acctData.freezeAuthority),
      top10: top10,
    };
  }).catch(function(){ return null; });
}

function getTokenPrice(mint){
  return fetch("https://price.jup.ag/v4/price?ids="+mint)
    .then(function(r){return r.json();})
    .then(function(d){ return d.data&&d.data[mint]?d.data[mint].price:0; })
    .catch(function(){return 0;});
}

function getJupQuote(inM,outM,amt){
  return fetch("https://quote-api.jup.ag/v6/quote?inputMint="+inM+"&outputMint="+outM+"&amount="+amt+"&slippageBps=100")
    .then(function(r){return r.json();}).catch(function(){return null;});
}

// Axiom → pump.fun → Dexscreener fallback chain
function getLiveTokens(){
  return fetch("https://api.axiom.trade/tokens/trending?chain=solana&limit=20",{
    headers:{"Accept":"application/json","Origin":"https://axiom.trade"}
  }).then(function(r){
    if(!r.ok) throw new Error("Axiom "+r.status);
    return r.json();
  }).then(function(d){
    var arr = Array.isArray(d)?d:(d.tokens||d.data||[]);
    return arr.slice(0,15).map(function(t){
      return {
        mint:t.mint||t.address||t.ca,
        sym:t.symbol||t.sym||"???",
        name:t.name||"Unknown",
        liq:t.liquidity||t.liq||0,
        vol24:t.volume24h||t.vol||0,
        vol1:t.volume1h||0,
        ch1:t.priceChange1h||t.change1h||0,
        price:t.price||t.priceUsd||0,
        age:t.age||(t.createdAt?(Date.now()-t.createdAt)/60000:null),
        buys:t.buys||t.txBuys||0,
        sells:t.sells||t.txSells||0,
        top10:t.top10HolderPercent||t.top10||0,
        mintAuth:t.mintEnabled||false,
        freezeAuth:t.freezeEnabled||false,
      };
    }).filter(function(t){return t.mint;});
  }).catch(function(){
    // Fallback: pump.fun
    return fetch("https://client-api-2-74b1891ee9f9.herokuapp.com/coins?offset=0&limit=20&sort=created_timestamp&order=DESC&includeNsfw=false")
      .then(function(r){return r.json();})
      .then(function(d){
        var coins = Array.isArray(d)?d:(d.coins||[]);
        return coins.slice(0,15).map(function(t){
          return {
            mint:t.mint, sym:t.symbol, name:t.name,
            liq:(t.virtual_sol_reserves||0)*S.solPrice/1e9*2||0,
            vol24:t.volume_24h||0, vol1:0,
            ch1:t.price_change_24h||0,
            price:(t.usd_market_cap||0)/(t.total_supply||1e9),
            age:t.created_timestamp?(Date.now()-t.created_timestamp*1000)/60000:null,
            buys:t.txns_24h||0, sells:0, top10:0,
            mintAuth:false, freezeAuth:false,
          };
        }).filter(function(t){return t.mint;});
      }).catch(function(){
        // Final fallback: Dexscreener
        return fetch("https://api.dexscreener.com/latest/dex/search?q=pump")
          .then(function(r){return r.json();})
          .then(function(d){
            if(!d.pairs)return[];
            var now=Date.now();
            return d.pairs
              .filter(function(p){return p.chainId==="solana"&&(p.liquidity&&p.liquidity.usd||0)>1000&&p.pairCreatedAt&&(now-p.pairCreatedAt)<6*3600000;})
              .sort(function(a,b){return(b.volume&&b.volume.h1||0)-(a.volume&&a.volume.h1||0);})
              .slice(0,15)
              .map(function(p){
                return {
                  mint:p.baseToken&&p.baseToken.address,
                  sym:p.baseToken&&p.baseToken.symbol||"???",
                  name:p.baseToken&&p.baseToken.name||"Unknown",
                  liq:p.liquidity&&p.liquidity.usd||0,
                  vol24:p.volume&&p.volume.h24||0,
                  vol1:p.volume&&p.volume.h1||0,
                  ch1:p.priceChange&&p.priceChange.h1||0,
                  price:parseFloat(p.priceUsd)||0,
                  age:p.pairCreatedAt?(now-p.pairCreatedAt)/60000:null,
                  buys:p.txns&&p.txns.h24&&p.txns.h24.buys||0,
                  sells:p.txns&&p.txns.h24&&p.txns.h24.sells||0,
                  top10:0, mintAuth:false, freezeAuth:false,
                };
              }).filter(function(t){return t.mint;});
          }).catch(function(){return[];});
      });
  });
}

// ══════════════════════════════════════════════════
//  LIVE SCAN CYCLE
// ══════════════════════════════════════════════════
function liveScanCycle(){
  if(!S.running||S.paper) return;
  var activeP1=0;
  for(var i=0;i<S.trades.length;i++){if(S.trades[i].phase<=3)activeP1++;}
  if(activeP1>0||S.trades.length>=2) return;
  if(S.balance<TRADE_AMT){showToast("⚠ Need "+fU(TRADE_AMT)+" balance","#f59e0b");return;}

  S.scanning=true; render();

  getLiveTokens().then(function(tokens){
    var idx=0;
    var bought=false;

    function processNext(){
      if(bought||!S.running||idx>=tokens.length){
        S.scanning=false; S.currentSym=""; render(); return;
      }
      var token=tokens[idx++];
      if(!token.mint){processNext();return;}

      var found=false;
      for(var i=0;i<S.trades.length;i++){if(S.trades[i].mint===token.mint)found=true;}
      if(found||S.blacklist.indexOf(token.mint)>=0){processNext();return;}

      S.currentSym=token.sym; render();

      var p = S.hKey ? getHeliusTokenData(token.mint).then(function(h){
        if(h){token.top10=h.top10||token.top10;token.mintAuth=h.mintAuth;token.freezeAuth=h.freezeAuth;}
        return token;
      }) : Promise.resolve(token);

      p.then(function(t){
        var res=runStrategy(t);
        S.log.unshift({
          id:Date.now()+Math.random(),time:Date.now(),
          mint:t.mint,sym:t.sym,name:t.name,
          result:res.pass?"BUY":"SKIP",
          reason:res.pass?res.sig+" signal":(res.reason||"").slice(0,42),
          checks:res.checks,
          liq:t.liq,vol24:t.vol24,price:t.price,
          expanded:false,
        });
        if(S.log.length>100)S.log.pop();
        render();

        if(!res.pass){processNext();return;}

        getSolPrice().then(function(sp){
          var lamps=Math.floor((TRADE_AMT/sp)*1e9);
          return getJupQuote(SOL_MINT,t.mint,lamps);
        }).then(function(q){
          if(!q||q.error){
            var le=S.log[0];if(le&&le.mint===t.mint){le.result="SKIP";le.reason="No Jupiter route";}
            render(); processNext(); return;
          }
          bought=true;
          S.balance-=TRADE_AMT;
          S.trades.push({
            id:Date.now(),mint:t.mint,name:t.name,sym:t.sym,
            sig:res.sig,checks:res.checks,
            entryPrice:t.price,curPrice:t.price,entryLiq:t.liq,
            tokensOut:parseInt(q.outAmount||0),
            invested:TRADE_AMT,pnl:0,mult:1,
            phase:1,holdPct:1.0,returns:[],
            peakVol:t.vol1||0,entryTime:Date.now(),paper:false,
          });
          showToast("◈ BOUGHT "+t.sym+" · "+res.sig+" · "+fU(TRADE_AMT),"#22c55e");
          window.open("https://jup.ag/swap/SOL-"+t.mint,"_blank");
          S.scanning=false;S.currentSym="";render();
        }).catch(function(){processNext();});
      }).catch(function(){processNext();});
    }
    processNext();
  }).catch(function(e){
    console.log("Scan err:",e);
    S.scanning=false;S.currentSym="";render();
  });
}

function livePriceTick(){
  if(!S.running||S.paper||!S.trades.length) return;
  S.trades.forEach(function(tr){
    getTokenPrice(tr.mint).then(function(price){
      if(!price)return;
      tr.curPrice=price;
      tr.pnl=((price-tr.entryPrice)/tr.entryPrice)*100;
      tr.mult=1+tr.pnl/100;
      checkExits(tr);
      S.portVal=S.balance+S.trades.reduce(function(s,t){return s+t.invested*t.holdPct*Math.max(t.mult,0.01);},0);
      render();
    });
  });
}

function startBot(){
  if(!S.paper&&!S.hKey){showToast("⚠ Enter Helius API key","#f59e0b");return;}
  S.running=true;
  clearInterval(S.scanTimer);clearInterval(S.tickTimer);
  clearInterval(S.balTimer);clearInterval(S.paperTimer);

  if(S.paper){
    S.paperTimer = setInterval(paperScanTick, 5000);
    S.tickTimer  = setInterval(paperPriceTick, 3000);
    paperScanTick(); // immediate
    showToast("▶ PAPER · simulating scans every 5s","#f59e0b");
  } else {
    S.scanTimer = setInterval(liveScanCycle, 30000);
    S.tickTimer = setInterval(livePriceTick, 15000);
    if(S.wPub){fetchWalletBalance();S.balTimer=setInterval(fetchWalletBalance,30000);}
    liveScanCycle();
    showToast("▶ LIVE · scanning Axiom + pump.fun","#22c55e");
  }
  render();
}

function stopBot(){
  S.running=false;
  clearInterval(S.scanTimer);clearInterval(S.tickTimer);
  clearInterval(S.balTimer);clearInterval(S.paperTimer);
  S.scanning=false;S.currentSym="";
  showToast("■ Bot stopped","#f87171");
  render();
}

function copyCA(addr,bid){
  try{
    if(navigator.clipboard){ navigator.clipboard.writeText(addr); }
    else{
      var el=document.createElement("textarea");el.value=addr;
      el.style.position="fixed";el.style.opacity="0";
      document.body.appendChild(el);el.focus();el.select();
      document.execCommand("copy");document.body.removeChild(el);
    }
  }catch(e){}
  showToast("CA copied ✓","#22c55e");
  var btn=bid?getEl(bid):null;
  if(btn){var h=btn.innerHTML;btn.innerHTML="<span style='color:#22c55e;font-size:10px;font-weight:bold'>✓ COPIED</span>";setTimeout(function(){btn.innerHTML=h;},2000);}
}

  +(hasActive?"<span style='font-size:9px;color:#f59e0b'>● IN TRADE</span>":"")
  +(hasMoon?"<span style='font-size:9px;color:#a78bfa'>🌙 MOONBAG</span>":"")
  +"</div></div>"
  +"<div style='text-align:right'><div style='font-size:9px;color:#222'>"+(S.paper?"PORTFOLIO":"WALLET")+"</div>"
  +"<div style='font-size:26px;font-weight:bold;letter-spacing:-1px;line-height:1.1;color:"+(S.portVal>=10?"#22c55e":"#f87171")+"'>"+fU(S.portVal)+"</div>"
  +(S.paper?"<div style='font-size:10px;color:"+(pr>=0?"#22c55e88":"#f8717188")+"'>"+fP(pr)+"</div>"
  :"<div style='font-size:9px;color:#333'>"+(S.wPub?sh(S.wPub):"no wallet")+"</div>")
  +"</div></div>"
  +"<div style='display:flex;gap:8px;margin-top:10px'>"
  +"<button onclick='"+(S.running?"stopBot()":"startBot()")+"' style='flex:1;padding:9px;border-radius:8px;font-size:10px;font-weight:bold;background:"+(S.running?"#f8717122":"#22c55e22")+";color:"+(S.running?"#f87171":"#22c55e")+";border:1px solid "+(S.running?"#f8717144":"#22c55e44")+";cursor:pointer'>"+(S.running?"■ STOP BOT":"▶ START BOT")+"</button>"
  +"<button onclick='goSetup()' style='padding:9px 14px;border-radius:8px;background:#111;color:#555;border:1px solid #1a1a1a;font-size:14px;cursor:pointer'>⚙</button>"
  +"</div>"
  +"<div style='margin-top:8px;display:flex;gap:8px;align-items:center'>"
  +"<div style='flex:1;height:2px;background:#0d0d0d;border-radius:99px;overflow:hidden'><div style='height:100%;background:"+(pr>=0?"#22c55e":"#f87171")+";width:"+Math.min((S.portVal/10)*50,100)+"%;transition:width 1s;border-radius:99px'></div></div>"
  +"<span style='font-size:8px;color:#222;white-space:nowrap'>Cash: <span style='color:#333'>"+fU(S.balance)+"</span></span></div></div>"
  // ── TABS ──
  +"<div style='display:flex;background:#050505;border-bottom:1px solid #111;position:sticky;top:0;z-index:99'>"
  +tabs.map(function(t){var on=S.tab===t[0];return "<button onclick=\"setTab('"+t[0]+"')\" style='flex:1;padding:10px 0;font-size:8px;font-weight:bold;letter-spacing:.5px;color:"+(on?"#22c55e":"#2a2a2a")+";border-bottom:2px solid "+(on?"#22c55e":"transparent")+";background:none;border-top:none;border-left:none;border-right:none;cursor:pointer'>"+t[1]+"</button>";}).join("")
  +"</div>"
  // ── PANE ──
  +"<div style='padding:"+(S.tab==="log"?"0":"14px")+"'>"
  // POSITIONS
  +(S.tab==="positions"
    ?"<div style='display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px'>"
      +[["CASH",fU(S.balance),"#aaa"],["WIN%",wr+"%","#22c55e"],["CLOSED",""+tc,"#aaa"],["STREAK",(S.losses>=3?"L":"W")+(S.losses>=3?S.losses:S.wins),S.losses>=3?"#f87171":"#22c55e"]]
        .map(function(sc){return "<div style='background:#0c0c0c;border:1px solid #1a1a1a;border-radius:9px;padding:8px 0;text-align:center'><div style='font-size:8px;color:#222'>"+sc[0]+"</div><div style='font-size:13px;font-weight:bold;color:"+sc[2]+";margin-top:2px'>"+sc[1]+"</div></div>";}).join("")+"</div>"
      +"<div style='background:#080808;border:1px solid #111;border-radius:10px;padding:10px 14px;margin-bottom:14px'>"
      +"<div style='display:flex;justify-content:space-around'>"
      +[["$5","Entry"],["2x","→80%"],["5x","→50%"],["10x","→50%"],["🌙","Moon"]].map(function(kv){return "<div style='text-align:center'><div style='font-size:11px;font-weight:bold;color:#444'>"+kv[0]+"</div><div style='font-size:7px;color:#1a1a1a;margin-top:2px'>"+kv[1]+"</div></div>";}).join("")
      +"</div></div>"
      +(S.trades.length===0
        ?"<div style='background:#0c0c0c;border:1px solid #1a1a1a;border-radius:14px;padding:32px 16px;text-align:center'>"
          +"<div style='font-size:28px;margin-bottom:8px'>"+(S.running?"⏳":"⏸")+"</div>"
          +"<div style='font-size:11px;color:#1e1e1e'>"+(S.running?(S.paper?"Simulating — check LOG tab":"Scanning Axiom…"):"Press START BOT")+"</div>"
          +(S.paper&&S.running?"<div style='font-size:10px;color:#333;margin-top:6px'>New scan every 5 seconds</div>":"")
          +"</div>"
        :S.trades.map(tradeHTML).join(""))
    :"")
  // SCANNER
  +(S.tab==="scanner"
    ?"<div style='font-size:10px;color:#333;margin-bottom:12px'>Paste any Solana CA to run all 3 strategy layers via Helius.</div>"
      +"<div style='display:flex;gap:8px;margin-bottom:10px'>"
      +"<input id='sinp' style='flex:1;padding:11px 13px;border-radius:9px;background:#0c0c0c;border:1px solid #1e1e1e;color:#fff;font-size:13px;font-family:monospace' placeholder='Paste contract address…'/>"
      +"<button onclick='runManualScan()' style='padding:10px 14px;border-radius:9px;background:#22c55e22;color:#22c55e;border:1px solid #22c55e44;font-size:11px;font-weight:bold;white-space:nowrap;cursor:pointer'>SCAN ◈</button>"
      +"</div>"
      +"<div style='font-size:9px;color:#333;padding:8px 10px;background:#0c0c0c;border-radius:8px;border:1px solid #111;margin-bottom:12px'>"
      +"💡 Find tokens on <a href='https://axiom.trade' target='_blank' style='color:#22c55e'>axiom.trade</a> → copy CA → paste above</div>"
      +"<div id='sres'></div>"
    :"")
  // HISTORY
  +(S.tab==="history"
    ?"<div style='display:flex;justify-content:space-between;margin-bottom:12px'>"
      +"<span style='font-size:9px;color:#2a2a2a;font-weight:bold'>CLOSED ("+tc+")</span>"
      +"<span style='font-size:10px;color:"+(S.totalPnl>=0?"#22c55e":"#f87171")+";font-weight:bold'>"+(S.totalPnl>=0?"+":"")+fU(S.totalPnl)+" realized</span></div>"
      +(tc===0?"<div style='text-align:center;padding:40px 0;font-size:11px;color:#141414'>No closed trades yet</div>":"")
      +S.closed.map(function(t,i){
        var pnl=t.pnl||0;var totalRet=t.returns?t.returns.reduce(function(s,r){return s+r.usd;},0):0;
        var uid="hc"+i;
        return "<div style='background:#0c0c0c;border:1px solid "+(pnl>0?"#22c55e18":"#1a1a1a")+";border-radius:12px;padding:12px 14px;margin-bottom:8px'>"
          +"<div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:4px'>"
          +"<span style='font-weight:bold;font-size:14px;color:#fff'>"+t.sym+(t.paper?" <span style='font-size:8px;color:#f59e0b'>PAPER</span>":"")+"</span>"
          +"<span style='font-size:13px;font-weight:bold;color:"+pC(pnl)+"'>"+fP(pnl)+"</span></div>"
          +(t.returns?t.returns.map(function(r){return "<div style='font-size:9px;color:#22c55e;margin-bottom:2px'>✓ "+r.label+" → +"+fU(r.usd)+"</div>";}).join(""):"")
          +(totalRet>0?"<div style='font-size:10px;color:#22c55e;font-weight:bold;margin-bottom:4px'>Total: +"+fU(totalRet)+"</div>":"")
          +ccaBtn(t.mint,uid)
          +"<div style='margin-top:6px;font-size:9px;color:#222'>"+t.exitReason+" · "+ag(t.closedAt)+"</div></div>";
      }).join("")
    :"")
  // LOG
  +(S.tab==="log"
    ?"<div style='padding:10px 14px;border-bottom:1px solid #111;display:flex;justify-content:space-between'>"
      +"<span style='font-size:9px;color:#222;font-weight:bold'>"+S.log.length+" tokens scanned</span>"
      +"<span style='font-size:8px;color:#1a1a1a'>"+(S.paper?"SIM":"LIVE")+" · tap to expand</span></div>"
      +(S.scanning?"<div style='padding:10px 14px;font-size:9px;color:#22c55e'>● Checking "+(S.currentSym||"…")+"</div>":"")
      +(S.log.length===0?"<div style='text-align:center;padding:40px 0;font-size:11px;color:#141414'>"+(S.running?"First scan starting…":"Press START BOT")+"</div>":"")
      +S.log.map(function(l,i){return logHTML(l,i);}).join("")
    :"")
  +"</div>";
}

    +"<button onclick=\"S.paper=false;render()\" style='flex:1;padding:11px;border-radius:9px;font-size:10px;font-weight:bold;cursor:pointer;background:"+(!S.paper?"#f871711a":"#0c0c0c")+";color:"+(!S.paper?"#f87171":"#333")+";border:1px solid "+(!S.paper?"#f8717144":"#1a1a1a")+"'>🔴 LIVE</button>"
    +"</div>"
    +(S.paper?"<div style='font-size:9px;color:#f59e0b;line-height:1.6'>Simulates trades every 5s. See scanner working immediately. No real money.</div>":"")
    +(!S.paper?"<div style='font-size:9px;color:#f87171;line-height:1.6'>⚠ Scans Axiom every 30s. Executes via Jupiter, confirmed in Phantom. Helius key required.</div>":"")
    +"</div>"
    +"<div style='background:#080808;border:1px solid #111;border-radius:10px;padding:12px 14px;margin-bottom:20px'>"
    +"<div style='font-size:8px;color:#2a2a2a;font-weight:bold;margin-bottom:8px'>EXIT STRATEGY</div>"
    +"<div style='display:flex;justify-content:space-around'>"
    +[["$5","Entry"],["2x","80%"],["5x","50%"],["10x","50%"],["🌙","Moon"]].map(function(kv){return "<div style='text-align:center'><div style='font-size:10px;font-weight:bold;color:#444'>"+kv[0]+"</div><div style='font-size:7px;color:#1a1a1a;margin-top:2px'>"+kv[1]+"</div></div>";}).join("")
    +"</div>"

    +"<button onclick='launch()' style='width:100%;padding:15px;border-radius:13px;background:#22c55e1a;color:#22c55e;border:1px solid #22c55e44;font-size:15px;font-weight:bold;cursor:pointer'>Launch Dashboard →</button>"

}

function setTab(t){ S.tab=t; render(); window.scrollTo(0,0); }
function goSetup(){ S.screen="setup"; render(); }
function launch(){
  persist(); S.screen="dashboard";
  if(!S.paper&&S.wPub) fetchWalletBalance(); else S.portVal=S.balance;
  render();
}

// ── BOOT ──
hydrate();
render();

} catch(err){
  var app = document.getElementById("app");
  if(app) app.innerHTML="<div style='padding:20px;color:#f87171'><div style='font-size:14px;margin-bottom:8px'>⚠ Load error</div><div style='background:#111;padding:10px;border-radius:8px;font-size:10px;word-break:break-all'>"+err.message+"</div></div>";
  console.error("REX:",err);
}
